// Fit canvas to the actual visible viewport (accounts for iOS Safari browser chrome)
function fitCanvas() {
  const vw = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  canvas.style.width  = Math.round(W * scale) + 'px';
  canvas.style.height = Math.round(H * scale) + 'px';
}
(window.visualViewport ?? window).addEventListener('resize', fitCanvas);
fitCanvas();

// ── Spawn-RNG (seeded, only used by the spawner — sounds/particles use native Math.random) ──
// This ensures the level sequence is identical on ditch-restart without being
// contaminated by RNG calls from sounds, particles, or enemy physics.
let _spawnRngState  = 1;
let _savedSpawnSeed = 1;

function spawnRng() {
  // mulberry32
  _spawnRngState = (_spawnRngState + 0x6D2B79F5) | 0;
  let t = Math.imul(_spawnRngState ^ (_spawnRngState >>> 15), 1 | _spawnRngState);
  t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

function freshLevelSeed() {
  // New seed from real time so every fresh level is different
  _savedSpawnSeed = _spawnRngState = ((performance.now() * 10000) | 0) | 1;
}

function restoreLevelSeed() {
  _spawnRngState = _savedSpawnSeed;
}

const starsBg = document.createElement('canvas');
starsBg.width = W; starsBg.height = H;
(function () {
  const sc = starsBg.getContext('2d');
  const g = sc.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0d1b3e');
  g.addColorStop(1, '#1a1a3e');
  sc.fillStyle = g;
  sc.fillRect(0, 0, W, H);
  for (let i = 0; i < 70; i++) {
    const sx = (i * 139 + 11) % W;
    const sy = (i * 71  +  7) % Math.round(H * 0.65);
    const sr = (i % 4 === 0) ? 1.8 : 1;
    sc.fillStyle = `rgba(255,255,255,${0.3 + (i % 3) * 0.15})`;
    sc.beginPath();
    sc.arc(sx, sy, sr, 0, Math.PI * 2);
    sc.fill();
  }
})();

function getTouchedBtn(cx, cy) {
  for (const [name, b] of Object.entries(MB)) {
    if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) return name;
  }
  return null;
}

function pressBtn(name) {
  if (name === 'left')    { keys['ArrowLeft']  = true; }
  if (name === 'right')   { keys['ArrowRight'] = true; }
  if (name === 'special') { keys['ArrowDown']  = true; }
  if (name === 'jump') {
    keys['ArrowUp'] = true;
    if (players.length > 0 && players[0].floatFrames === 0) tryJump(players[0]);
  }
}

function releaseBtn(name) {
  if (name === 'left')    { keys['ArrowLeft']  = false; }
  if (name === 'right')   { keys['ArrowRight'] = false; }
  if (name === 'special') { keys['ArrowDown']  = false; }
  if (name === 'jump') {
    keys['ArrowUp'] = false;
    if (players.length > 0) releaseJump(players[0]);
  }
}

// ── Sound ──────────────────────────────────────────────────────────────────────
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}

function playJump() {
  try {
    const ac = getAC();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    const t = ac.currentTime;
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(520, t + 0.18);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.start(t); osc.stop(t + 0.22);
  } catch(e) {}
}

function playStep() {
  try {
    const ac = getAC();
    const bufLen = Math.floor(ac.sampleRate * 0.04);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 300;
    filter.Q.value = 0.8;
    src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.18, ac.currentTime);
    src.start(ac.currentTime);
  } catch(e) {}
}

function playPunch() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    // Low thud: short sine burst at ~80 Hz dropping fast
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
    // High crack: noise burst layered on top
    const bufLen = Math.floor(ac.sampleRate * 0.03);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const g2 = ac.createGain();
    src.connect(g2); g2.connect(ac.destination);
    g2.gain.setValueAtTime(0.3, t);
    src.start(t);
  } catch(e) {}
}

function playPling() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400, t);
    osc.frequency.setValueAtTime(1800, t + 0.02);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.start(t); osc.stop(t + 0.28);
  } catch(e) {}
}

function playHeart() {
  try {
    const ac = getAC();
    const t  = ac.currentTime;
    [523, 659, 784].forEach((freq, i) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const st = t + i * 0.13;
      gain.gain.setValueAtTime(0.001, st);
      gain.gain.linearRampToValueAtTime(0.22, st + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, st + 0.25);
      osc.start(st); osc.stop(st + 0.28);
    });
  } catch(e) {}
}

function playPotion() {
  try {
    const ac = getAC();
    const t  = ac.currentTime;
    // Bubbling: three quick low blurps
    [180, 220, 160].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 600;
      osc.connect(filt); filt.connect(gain); gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, t + i * 0.08);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + i * 0.08 + 0.1);
      gain.gain.setValueAtTime(0.18, t + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.14);
      osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.15);
    });
  } catch(e) {}
}

function playPuff() {
  try {
    const ac = getAC();
    const bufLen = Math.floor(ac.sampleRate * 0.08);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.5);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 0.5;
    src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.3, ac.currentTime);
    src.start(ac.currentTime);
  } catch(e) {}
}

function playBoing() {
  try {
    const ac = getAC();
    const t  = ac.currentTime;
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(140, t);
    osc.frequency.exponentialRampToValueAtTime(520, t + 0.12);
    osc.frequency.exponentialRampToValueAtTime(320, t + 0.32);
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    osc.start(t); osc.stop(t + 0.38);
  } catch(e) {}
}

function playRocket() {
  try {
    const ac = getAC();
    const t  = ac.currentTime;
    // Rising whoosh
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80,  t);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.35);
    gain.gain.setValueAtTime(0.28, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.start(t); osc.stop(t + 0.4);
    // Short noise crack on top
    const bufLen = Math.floor(ac.sampleRate * 0.06);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const g2 = ac.createGain();
    src.connect(g2); g2.connect(ac.destination);
    g2.gain.setValueAtTime(0.2, t);
    src.start(t);
  } catch(e) {}
}

// ── Input ─────────────────────────────────────────────────────────────────────
function tryJump(p) {
  if (gs !== 'playing') return;
  if (p.rocketFrames > 0 || p.floatFrames > 0) return;
  if (p.onGround) {
    p.vy = -8; p.onGround = false; p.jumpHeld = true; p.jumpBoost = 14;
    playJump();
  } else if (p.animalIdx === 0 && !p.doubleJumped) {
    // Fox double jump: same height as first jump
    p.vy = -8; p.jumpHeld = true; p.jumpBoost = 14;
    p.doubleJumped = true;
    playJump();
  }
}

function releaseJump(p) { p.jumpHeld = false; }

// ── Keyboard
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' ||
      e.code === 'ArrowUp'   || e.code === 'ArrowDown') {
    e.preventDefault();
  }
  if (e.code === 'ArrowUp') {
    if      (gs === 'playing' && players.length > 0 && players[0].floatFrames === 0) tryJump(players[0]);
    else if (gs === 'levelend')                 advanceLevel();
    else if (gs === 'gameover' || gs === 'win') gs = 'select';
  }
  if (e.code === 'KeyW') {
    e.preventDefault();
    if (gs === 'playing' && players.length > 1 && players[1].floatFrames === 0) tryJump(players[1]);
  }
  if (e.code === 'Enter') {
    if      (gs === 'levelend')                 advanceLevel();
    else if (gs === 'gameover' || gs === 'win') gs = 'select';
  }
  // Dev shortcut: digit 1–5 → jump to that level with 3 lives
  const digitMatch = e.code.match(/^Digit([1-6])$/);
  if (digitMatch) {
    level = parseInt(digitMatch[1]);
    lives = 3;
    score = 0;
    freshLevelSeed();
    initLevel();
    gs = 'playing';
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ArrowUp' && players.length > 0) releaseJump(players[0]);
  if (e.code === 'KeyW'    && players.length > 1) releaseJump(players[1]);
});

// ── Mouse: mousedown starts jump (for variable height), click handles UI
canvas.addEventListener('mousedown', e => {
  if (gs === 'playing' && players.length > 0) tryJump(players[0]);
});
canvas.addEventListener('mouseup', () => { if (players.length > 0) releaseJump(players[0]); });
canvas.addEventListener('click', e => {
  if (gs === 'playing') return; // handled by mousedown
  const r  = canvas.getBoundingClientRect();
  handleUIClick((e.clientX - r.left) * W / r.width,
                (e.clientY - r.top)  * H / r.height);
});

// ── Touch handlers ────────────────────────────────────────────────────────────
function toCanvasCoords(touch) {
  const r = canvas.getBoundingClientRect();
  return {
    cx: (touch.clientX - r.left) * W / r.width,
    cy: (touch.clientY - r.top)  * H / r.height,
  };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gs !== 'playing') {
    const { cx, cy } = toCanvasCoords(e.changedTouches[0]);
    handleUIClick(cx, cy);
    return;
  }
  if (!isMobile) {
    // Fallback for non-mobile touch (shouldn't normally happen)
    if (players.length > 0) tryJump(players[0]);
    return;
  }
  for (const t of e.changedTouches) {
    const { cx, cy } = toCanvasCoords(t);
    const btn = getTouchedBtn(cx, cy);
    if (btn) { activeTouches.set(t.identifier, btn); pressedButtons.add(btn); pressBtn(btn); }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gs !== 'playing' || !isMobile) return;
  for (const t of e.changedTouches) {
    const prev = activeTouches.get(t.identifier);
    const { cx, cy } = toCanvasCoords(t);
    const next = getTouchedBtn(cx, cy);
    if (prev === next) continue;
    if (prev) { pressedButtons.delete(prev); releaseBtn(prev); }
    if (next) { activeTouches.set(t.identifier, next); pressedButtons.add(next); pressBtn(next); }
    else activeTouches.delete(t.identifier);
  }
}, { passive: false });

function endTouches(e) {
  e.preventDefault();
  if (!isMobile) {
    if (players.length > 0) releaseJump(players[0]);
    return;
  }
  for (const t of e.changedTouches) {
    const btn = activeTouches.get(t.identifier);
    if (btn) { pressedButtons.delete(btn); releaseBtn(btn); activeTouches.delete(t.identifier); }
  }
}
canvas.addEventListener('touchend',    endTouches, { passive: false });
canvas.addEventListener('touchcancel', endTouches, { passive: false });

function handleUIClick(mx, my) {
  if (gs === 'levelend')                     { advanceLevel(); return; }
  if (gs === 'gameover' || gs === 'win')     { gs = 'select'; return; }
  if (gs === 'select') {
    const p1cards = getCardRects(SEL_P1_Y);
    for (let i = 0; i < ANIMALS.length; i++) {
      const c = p1cards[i];
      if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
        selAnimal = i; return;
      }
    }
    if (!isMobile) {
      const p2cards = getCardRects(SEL_P2_Y);
      for (let i = 0; i < ANIMALS.length; i++) {
        const c = p2cards[i];
        if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
          selAnimal2 = i; return;
        }
      }
    }
    if (isMobile) {
      const mb = { x: W / 2 - 100, y: SEL_BTN_Y, w: 200, h: 50 };
      if (mx >= mb.x && mx <= mb.x + mb.w && my >= mb.y && my <= mb.y + mb.h) {
        twoPlayer = false; startGame(); return;
      }
    } else {
      const b1 = getTwoPlayerBtn();
      if (mx >= b1.x && mx <= b1.x + b1.w && my >= b1.y && my <= b1.y + b1.h) {
        twoPlayer = false; startGame(); return;
      }
      const b2 = getSoloBtn();
      if (mx >= b2.x && mx <= b2.x + b2.w && my >= b2.y && my <= b2.y + b2.h) {
        twoPlayer = true; startGame(); return;
      }
    }
  }
}

// ── Layout helpers ────────────────────────────────────────────────────────────
// Combined select screen row positions
const SEL_CW   = 86, SEL_CH = 96, SEL_CGAP = 12;
const SEL_SX   = (W - (ANIMALS.length * SEL_CW + (ANIMALS.length - 1) * SEL_CGAP)) / 2;
const SEL_P1_Y = 88;
const SEL_P2_Y = 210;
const SEL_BTN_Y = 328;

function getCardRects(rowY) {
  return ANIMALS.map((_, i) => ({
    x: SEL_SX + i * (SEL_CW + SEL_CGAP), y: rowY, w: SEL_CW, h: SEL_CH,
  }));
}

function getTwoPlayerBtn() {
  return { x: W / 2 - 214, y: SEL_BTN_Y, w: 200, h: 50 };
}

function getSoloBtn() {
  return { x: W / 2 + 14,  y: SEL_BTN_Y, w: 200, h: 50 };
}

// ── Game logic ────────────────────────────────────────────────────────────────
function startGame() {
  level = 1;
  lives = 3;
  score = 0;
  freshLevelSeed();
  initLevel();
  gs = 'playing';
}

function initLevel() {
  activeTouches.clear(); pressedButtons.clear();
  frame       = 0;
  gScroll     = 0;
  hillOff     = 0;
  flashFrames = 0;
  greenFrames = 0;
  introFrames = 240;
  obstacles  = [];
  ditches    = [];
  diamonds   = [];
  hearts     = [];
  potions    = [];
  rockets       = [];
  particles     = [];
  shadowWolves  = [];
  yarnBalls     = [];
  clocks        = [];
  hourglasses   = [];
  clockFrames     = 0;
  hourglassFrames = 0;
  popups     = [];
  if (level % 2 === 1) heartSpawned = false;
  const _scfg = LEVEL_CFG[level - 1];
  skyGradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGradient.addColorStop(0, _scfg.sky1);
  skyGradient.addColorStop(1, _scfg.sky2);
  spawner = {
    cd: 160,
    lastType: '',
    platformCount: 0,
    diamondBudget: 10 + Math.floor(spawnRng() * 11),
    potionSpawned: false,
    rocketCount: 0,
    clockSpawned: false,
    hourglassSpawned: false,
    highDiaCD: 200 + Math.floor(spawnRng() * 100),
  };
  players = [ makePlayer(PLAYER_X, selAnimal) ];
  if (twoPlayer) players.push(makePlayer(PLAYER_X2, selAnimal2));
  for (const c of clouds) c.x = [90, 330, 570, 730][clouds.indexOf(c)];
}

function advanceLevel() {
  if (level >= 6) { gs = 'win'; return; }
  level++;
  freshLevelSeed();
  initLevel();
  gs = 'playing';
}

function update() {
  if (gs !== 'playing') return;

  const cfg = LEVEL_CFG[level - 1];
  frame++;
  // Speed multiplier: 2× during rocket, eases back to 1× in the last 90 frames
  const maxRocket  = players.reduce((m, p) => Math.max(m, p.rocketFrames), 0);
  const rocketFade = maxRocket > 0 ? Math.min(1, maxRocket / 90) : 0;
  if (clockFrames     > 0) clockFrames--;
  if (hourglassFrames > 0) hourglassFrames--;
  let speedMult = 1 + rocketFade;
  if (clockFrames     > 0) speedMult *= 1.5;
  if (hourglassFrames > 0) speedMult *= 0.5;
  let eff;
  if (speedMult !== 1) {
    // Reuse effCfg object — copy only what changes to avoid GC pressure
    if (effCfg.speed === undefined) Object.assign(effCfg, cfg); // first-time init
    else if (effCfg.gapLo !== cfg.gapLo) Object.assign(effCfg, cfg); // level changed
    effCfg.speed = cfg.speed * speedMult;
    eff = effCfg;
  } else {
    eff = cfg;
  }

  gScroll = (gScroll + eff.speed) % 50;
  hillOff += eff.speed * 0.3;

  // Update each player (snapshot prevents issues if initLevel is called mid-loop)
  const activePlayers = [...players];
  for (const p of activePlayers) {
    updatePlayer(p, eff);
    if (gs !== 'playing') return;
  }

  updateWorld(eff);
  updateCollectibles(eff);
  updateEnemies(eff);
  updateSpawner(eff);
  updateCollisions();
  updateShadowWolves();
  updateYarnBalls();

  if (introFrames > 0) introFrames--;
  if (frame >= LEVEL_FRAMES) gs = 'levelend';
}

function updateWorld(cfg) {
  // Clouds
  for (const c of clouds) {
    c.x -= cfg.speed * 0.25;
    if (c.x + c.r * 2.5 < 0) c.x = W + c.r * 2;
  }
  // Timers
  if (flashFrames > 0) flashFrames--;
  if (greenFrames > 0) greenFrames--;
  // Floating popups — move and cull in one pass (no new array)
  for (let i = popups.length - 1; i >= 0; i--) {
    const pp = popups[i];
    pp.y -= 1.5; pp.life--;
    if (pp.life <= 0) popups.splice(i, 1);
  }
  // Move & cull obstacles/ditches — in-place, no filter allocation
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= cfg.speed;
    if (obstacles[i].x <= -200) obstacles.splice(i, 1);
  }
  for (let i = ditches.length - 1; i >= 0; i--) {
    const d = ditches[i];
    d.x -= cfg.speed;
    if (d.x + d.w <= -10) ditches.splice(i, 1);
  }
  // Explosion particles — move and cull in one pass
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.25; pt.life--;
    if (pt.life <= 0) particles.splice(i, 1);
  }
}

function updateCollectibles(cfg) {
  const halfP = PLAYER_SIZE / 2;
  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    h.x -= cfg.speed;
    if (h.x < -20) { hearts.splice(i, 1); continue; }
    for (const p of players) {
      if (Math.abs(p.x - h.x) < halfP + 10 && Math.abs((p.y - halfP) - h.y) < halfP + 10) {
        lives = Math.min(lives + 1, 9);
        greenFrames = 14;
        playHeart();
        popups.push({ x: h.x, y: h.y - 10, text: '❤️ +1', life: 80, color: '#ff4488' });
        hearts.splice(i, 1); break;
      }
    }
  }

  for (let i = rockets.length - 1; i >= 0; i--) {
    const ro = rockets[i];
    ro.x -= cfg.speed;
    if (ro.x < -20) { rockets.splice(i, 1); continue; }
    for (const p of players) {
      if (Math.abs(p.x - ro.x) < halfP + 10 && Math.abs((p.y - halfP) - ro.y) < halfP + 10) {
        for (const pl of players) { pl.rocketFrames = 600; pl.floatFrames = 0; }
        playRocket();
        popups.push({ x: ro.x, y: ro.y - 10, text: '🚀 Start!', life: 90, color: '#ff9944' });
        rockets.splice(i, 1); break;
      }
    }
  }

  for (let i = potions.length - 1; i >= 0; i--) {
    const po = potions[i];
    po.x -= cfg.speed;
    if (po.x < -20) { potions.splice(i, 1); continue; }
    for (const p of players) {
      if (Math.abs(p.x - po.x) < halfP + 10 && Math.abs((p.y - halfP) - po.y) < halfP + 10) {
        p.floatFrames = 450;
        playPotion();
        popups.push({ x: po.x, y: po.y - 10, text: '✨ Schweben!', life: 90, color: '#80ff80' });
        potions.splice(i, 1); break;
      }
    }
  }

  for (let i = clocks.length - 1; i >= 0; i--) {
    const c = clocks[i];
    c.x -= cfg.speed;
    if (c.x < -20) { clocks.splice(i, 1); continue; }
    for (const p of players) {
      if (Math.abs(p.x - c.x) < halfP + 14 && Math.abs((p.y - halfP) - c.y) < halfP + 14) {
        clockFrames = 600;
        playPotion();
        popups.push({ x: c.x, y: c.y - 10, text: '⚡ 1.5× Tempo!', life: 90, color: '#ffcc00' });
        clocks.splice(i, 1); break;
      }
    }
  }

  for (let i = hourglasses.length - 1; i >= 0; i--) {
    const h = hourglasses[i];
    h.x -= cfg.speed;
    if (h.x < -20) { hourglasses.splice(i, 1); continue; }
    for (const p of players) {
      if (Math.abs(p.x - h.x) < halfP + 14 && Math.abs((p.y - halfP) - h.y) < halfP + 14) {
        hourglassFrames = 900;
        playPotion();
        popups.push({ x: h.x, y: h.y - 10, text: '🐢 Zeitlupe!', life: 90, color: '#88aaff' });
        hourglasses.splice(i, 1); break;
      }
    }
  }

  for (let i = diamonds.length - 1; i >= 0; i--) {
    const d = diamonds[i];
    d.x -= cfg.speed;
    if (d.x < -20) { diamonds.splice(i, 1); continue; }
    for (const p of players) {
      if (Math.abs(p.x - d.x) < halfP + 6 && Math.abs((p.y - halfP) - d.y) < halfP + 6) {
        addScore(d.pts);
        playPling();
        popups.push({ x: d.x, y: d.y - 10, text: `+${d.pts}`, life: 45, color: d.color });
        diamonds.splice(i, 1); break;
      }
    }
  }
}

function updateEnemies(cfg) {
  for (const o of obstacles) {
    // Frozen by dog bark: skip movement
    if ((o.type === 'lion' || o.type === 'vulture' || o.type === 'kangaroo') && o.frozenFrames > 0) {
      o.frozenFrames--;
      continue;
    }
    // ── Kangaroo: bounces left/right ─────────────────────────────────────────
    if (o.type === 'kangaroo') {
      const groundY = GROUND_Y - o.h;
      if (o.jumpTimer > 0) {
        o.jumpTimer--;
      } else if (o.jumpTimer === 0) {
        o.vy = -(10 + Math.random() * 2);
        o.vx = (Math.random() < 0.5 ? -1 : 1) * (0.8 + Math.random() * 1.4);
        o.jumpTimer = -1; // mark airborne
      } else { // airborne
        o.vy += GRAVITY;
        o.y  += o.vy;
        o.x  += o.vx;
        if (o.y >= groundY) {
          o.y = groundY;
          o.vy = 0; o.vx = 0;
          o.jumpTimer = 22 + Math.floor(Math.random() * 22);
        }
      }
      continue;
    }
    if (o.type !== 'vulture') continue;
    switch (o.state) {
      case 'bottom':
        if (--o.stateTimer <= 0) o.state = 'rising';
        break;
      case 'rising':
        o.y -= o.flySpeed;
        if (o.y <= o.yHigh) { o.y = o.yHigh; o.state = 'top'; o.stateTimer = o.waitTop; }
        break;
      case 'top':
        if (--o.stateTimer <= 0) o.state = 'falling';
        break;
      case 'falling':
        o.y += o.flySpeed;
        if (o.y >= o.yLow) { o.y = o.yLow; o.state = 'bottom'; o.stateTimer = o.waitBot; }
        break;
    }
  }
}

function updateSpawner(cfg) {
  const flagTravelFrames = Math.ceil((W + 20 - PLAYER_X) / cfg.speed);
  const flagSpawnFrame   = LEVEL_FRAMES - 15 - flagTravelFrames;
  const clearZoneFrames  = Math.ceil(350 / cfg.speed);

  // Main spawn stream
  spawner.cd--;
  if (spawner.cd <= 0 && frame < flagSpawnFrame - clearZoneFrames) spawnNext(cfg);

  // High diamonds — only reachable in float mode (y ≈ 60–130, above max jump height)
  spawner.highDiaCD--;
  if (spawner.highDiaCD <= 0 && frame < flagSpawnFrame - clearZoneFrames) {
    const count   = 2 + Math.floor(spawnRng() * 4);
    const baseY   = 60 + Math.floor(spawnRng() * 70);
    const spacing = 55 + Math.floor(spawnRng() * 40);
    for (let i = 0; i < count; i++) {
      const jitter = Math.floor(spawnRng() * 30) - 15;
      diamonds.push({ x: W + 30 + i * spacing, y: baseY + jitter,
                      color: DIAMOND.high.color, pts: DIAMOND.high.pts });
    }
    spawner.highDiaCD = 260 + Math.floor(spawnRng() * 140);
  }

  if (frame === flagSpawnFrame) {
    obstacles.push({ x: W + 20, type: 'flag' });
    obstacles = obstacles.filter(o => o.type === 'flag' || o.x < W);
    ditches   = ditches.filter(d => d.x + d.w < W);
  }

  // Clock: level 1, first quarter — wait for a gap in the obstacle stream
  if (level === 1 && !spawner.clockSpawned && frame >= 180 && frame <= LEVEL_FRAMES / 4) {
    if (obstaclesClearAt(W + 20, 90)) {
      clocks.push({ x: W + 20, y: GROUND_Y - 95 });
      spawner.clockSpawned = true;
    }
  }
  // Hourglass: level 5, first quarter — wait for a gap in the obstacle stream
  if (level >= 5 && !spawner.hourglassSpawned && frame >= 180 && frame <= LEVEL_FRAMES / 4) {
    if (obstaclesClearAt(W + 20, 90)) {
      hourglasses.push({ x: W + 20, y: GROUND_Y - 95 });
      spawner.hourglassSpawned = true;
    }
  }
}

function updateCollisions() {
  for (const p of players) {
    if (p.rocketFrames > 0) {
      // Rocket destroys boxes and enemies on contact
      for (const o of obstacles) {
        if (!overlaps(p, o)) continue;
        if (o.type === 'box') {
          explodeBox(o);
        } else if (o.type === 'lion') {
          stompP(p, o, 100);
        } else if (o.type === 'vulture' || o.type === 'kangaroo') {
          stompP(p, o, 150);
        }
      }
    } else if (p.invFrames === 0) {
      for (const o of obstacles) {
        if (o.type === 'flag' || o.type === 'platform') continue;
        if (!overlaps(p, o)) continue;
        if (o.type === 'box') {
          if (p.vy >= 0 && p.y > o.y + 5) {
            if (p.animalIdx === 5 && p.moleBoxes > 0) {
              // Mole runs through box horizontally — destroy it, no damage
              explodeBox(o);
              p.moleBoxes--;
              if (p.moleBoxes === 0) p.moleCooldown = 600; // 10 s cooldown then refill
            } else {
              hitP(p, o);
            }
          }
        } else if (o.type === 'lion') {
          if ((!p.onGround && p.vy > 0) || o.frozenFrames > 0) stompP(p, o, 100); else hitP(p, o);
        } else if (o.type === 'vulture') {
          if ((!p.onGround && p.vy > 0) || o.frozenFrames > 0) stompP(p, o, 150); else hitP(p, o);
        } else if (o.type === 'kangaroo') {
          if ((!p.onGround && p.vy > 0) || o.frozenFrames > 0) stompP(p, o, 150); else hitP(p, o);
        }
        break;
      }
    }
  }
}

function updateShadowWolves() {
  for (const sw of shadowWolves) {
    sw.x -= 20; // fast sweep left
    // Collide with enemies
    for (const o of obstacles) {
      if (o.type !== 'lion' && o.type !== 'vulture' && o.type !== 'kangaroo') continue;
      if (o.x < 0) continue;
      const swL = sw.x, swR = sw.x + sw.w;
      const oL  = o.x,  oR  = o.x + o.w;
      if (swR > oL && swL < oR) {
        const cx = o.x + o.w / 2, cy = o.y;
        const pts = (o.type === 'lion') ? 100 : 150;
        o.x = -600;
        addScore(pts);
        popups.push({ x: cx, y: cy, text: `+${pts}`, life: 55, color: '#ccccff' });
        playPunch();
      }
    }
  }
  shadowWolves = shadowWolves.filter(sw => sw.x + sw.w > -20);
}

function updateYarnBalls() {
  for (const b of yarnBalls) {
    b.x += b.vx;
    for (const o of obstacles) {
      if (o.type !== 'lion' && o.type !== 'vulture' && o.type !== 'kangaroo') continue;
      if (o.x < 0) continue;
      if (b.x + b.r > o.x && b.x - b.r < o.x + o.w &&
          b.y + b.r > o.y && b.y - b.r < o.y + o.h) {
        const pts = o.type === 'lion' ? 100 : 150;
        const cx = o.x + o.w / 2, cy = o.y;
        o.x = -600;
        addScore(pts);
        popups.push({ x: cx, y: cy, text: `+${pts}`, life: 55, color: '#ff88cc' });
        playPunch();
      }
    }
  }
  yarnBalls = yarnBalls.filter(b => b.x - b.r < W + 20);
}

function updatePlayer(p, cfg) {
  const prevY = p.y;

  // ── Rocket mode: steerable vertically, no gravity, fully invincible ─────────
  if (p.rocketFrames > 0) {
    const isP1  = p === players[0];
    const upKey = isP1 ? keys['ArrowUp']   : keys['KeyW'];
    const dnKey = isP1 ? keys['ArrowDown'] : keys['KeyS'];
    p.vy = upKey ? -4 : dnKey ? 4 : 0;
    p.y  = Math.max(PLAYER_SIZE, Math.min(GROUND_Y, p.y + p.vy));
    p.vx = 0;
    p.onGround = false;
    p.runT += 0.12;
    p.rocketFrames--;
    if (p.invFrames > 0) p.invFrames--;
    return;
  }

  if (p.floatFrames > 0) {
    const isP1  = p === players[0];
    const upKey = isP1 ? keys['ArrowUp']  : keys['KeyW'];
    const dnKey = isP1 ? keys['ArrowDown'] : keys['KeyS'];
    p.vy = upKey ? -2.5 : dnKey ? 2.5 : 0;
    p.y  = Math.max(PLAYER_SIZE, p.y + p.vy);
    p.onGround = false;
    p.floatFrames--;
    if (p.floatFrames === 0) playPuff();
  } else {
    p.vy += GRAVITY;
    p.y  += p.vy;
    p.onGround = false;
  }

  // Horizontal movement
  // Left speed = 65 % of world scroll → always visibly leftward but never faster than scroll
  const isP1      = p === players[0];
  const leftKey   = isP1 ? keys['ArrowLeft']  : keys['KeyA'];
  const rightKey  = isP1 ? keys['ArrowRight'] : keys['KeyD'];
  p.vx = rightKey ? MOVE_SPEED : leftKey ? -MOVE_SPEED : 0;
  p.x  = Math.max(PLAYER_SIZE / 2 + 4, Math.min(W - PLAYER_SIZE / 2 - 4, p.x + p.vx));

  const aboveDitch = ditches.some(d => p.x > d.x + 8 && p.x < d.x + d.w - 8);
  const overDitch  = prevY > GROUND_Y || aboveDitch;

  if (aboveDitch && !p.onGround) p.pendingDitchBonus = true;

  if (p.floatFrames === 0 && !overDitch && p.y >= GROUND_Y) {
    p.y = GROUND_Y;
    p.vy = 0;
    p.onGround = true;
    p.doubleJumped = false;
    if (p.pendingDitchBonus) {
      p.pendingDitchBonus = false;
      addScore(20);
      popups.push({ x: p.x, y: p.y - 60, text: '+20', life: 55, color: '#a0e060' });
    }
  }

  if (p.floatFrames === 0 && p.y > H + 60) {
    fellIntoDitchP(p);
    return;
  }

  if (!p.onGround && p.vy >= 0) {
    for (const o of obstacles) {
      if (o.type !== 'box' && o.type !== 'platform') continue;
      const pL = p.x - PLAYER_SIZE / 2 + 8;
      const pR = p.x + PLAYER_SIZE / 2 - 8;
      if (pR > o.x && pL < o.x + o.w && p.y >= o.y && prevY <= o.y + 6) {
        p.y = o.y;
        const _isP1b = p === players[0];
        const _dnKey = _isP1b ? keys['ArrowDown'] : keys['KeyS'];
        if (!o.trampoline && p.animalIdx === 3 && _dnKey && p.donkeyBoxCD === 0) {
          // Donkey ground-pound: explode box, bounce up, 25 pts
          explodeBox(o);
          p.vy        = JUMP_VY * 1.15;
          p.jumpHeld  = false;
          p.jumpBoost = 0;
          p.onGround  = false;
          addScore(25);
          popups.push({ x: p.x, y: p.y - 40, text: '+25', life: 55, color: '#ff9900' });
          playBoing();
          p.donkeyBoxCount++;
          if (p.donkeyBoxCount >= 3) { p.donkeyBoxCD = 300; p.donkeyBoxCount = 0; }
        } else if (o.trampoline) {
          // Super-jump: ~360 px upward — enough to reach high diamonds at y≈60–130
          p.vy       = JUMP_VY * 1.45;
          p.jumpHeld = false;
          p.jumpBoost = 0;
          p.onGround  = false;
          playBoing();
        } else {
          p.vy = 0;
          p.onGround = true;
          p.doubleJumped = false;
        }
        break;
      }
    }
  }

  if (p.jumpHeld && p.jumpBoost > 0 && p.vy < 0) {
    p.vy -= 0.5;
    p.jumpBoost--;
  } else if (p.vy >= 0) {
    p.jumpHeld = false;
  }

  if (p.onGround) {
    const prevRunT = p.runT;
    p.runT += 0.038;
    if (p.vx !== 0 && Math.floor(p.runT) > Math.floor(prevRunT)) playStep();
  }

  if (p.invFrames > 0) p.invFrames--;

  // ── Special abilities: down key while on ground ──────────────────────────
  const _isP1sa  = p === players[0];
  const _dnKeySa = _isP1sa ? keys['ArrowDown'] : keys['KeyS'];
  if (p.barkCooldown   > 0) p.barkCooldown--;
  if (p.scratchCooldown > 0) p.scratchCooldown--;
  if (p.donkeyBoxCD    > 0) p.donkeyBoxCD--;
  if (p.wolfCooldown   > 0) p.wolfCooldown--;
  if (p.moleCooldown   > 0) { p.moleCooldown--; if (p.moleCooldown === 0) p.moleBoxes = 5; }

  if (p.animalIdx === 1 && p.barkCooldown === 0 && p.floatFrames === 0 && p.rocketFrames === 0 && _dnKeySa) {
    // Dog bark: freeze all visible enemies for 90 frames
    for (const o of obstacles) {
      if (o.type === 'lion' || o.type === 'vulture' || o.type === 'kangaroo')
        o.frozenFrames = 180;
    }
    p.barkCooldown = 300;
    playPunch();
    popups.push({ x: p.x, y: p.y - 50, text: 'WUFF!', life: 60, color: '#FFE040' });
  }

  if (p.animalIdx === 2 && p.scratchCooldown === 0 && p.floatFrames === 0 && p.rocketFrames === 0 && _dnKeySa) {
    // Cat: shoot yarn ball to the right
    yarnBalls.push({ x: p.x + 20, y: p.y - PLAYER_SIZE / 2, vx: 9, r: 10 });
    p.scratchCooldown = 180;
    playPling();
  }

  if (p.animalIdx === 4 && p.wolfCooldown === 0 && p.floatFrames === 0 && p.rocketFrames === 0 && _dnKeySa) {
    // Wolf howl: summon shadow wolf that sweeps the screen from right to left
    shadowWolves.push({ x: W + 58, y: GROUND_Y, w: 58, h: 62, owner: p });
    p.wolfCooldown = 288;
    playPunch();
    popups.push({ x: p.x, y: p.y - 50, text: 'AUUU!', life: 60, color: '#ccccff' });
  }
}

function explodeBox(o) {
  const cx = o.x + o.w / 2;
  const cy = o.y + o.h / 2;
  const colors = ['#C87941', '#7A4420', '#E8A060', '#FFD700', '#fff'];
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 22 + Math.floor(Math.random() * 18),
      maxLife: 40,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 4,
    });
  }
  o.x = -600; // remove from play
  const boxPts = level >= 5 ? 20 : 5;
  addScore(boxPts);
  popups.push({ x: cx, y: cy - 10, text: `+${boxPts}`, life: 45, color: '#FFD700' });
}

// ── Spawn helpers ─────────────────────────────────────────────────────────────
const BOX_W = 44, BOX_H = 46;

function spawnNext(cfg) {
  const roll        = spawnRng();
  const ditchProb   = level >= 5 ? 0.11 : 0.22;
  const enemyTotal  = cfg.lionRatio * (1 - ditchProb);
  // Enemy mix scales with level: L1=lion only, L2+=vulture, L3+=kangaroo
  const lionProb    = enemyTotal * (level >= 3 ? 0.38 : level >= 2 ? 0.57 : 1.00);
  const vultureProb = enemyTotal * (level >= 3 ? 0.28 : level >= 2 ? 0.43 : 0.00);
  const kangProb    = enemyTotal * (level >= 3 ? 0.34 : 0.00);
  const noEnemy     = spawner.lastType === 'lion' || spawner.lastType === 'vulture' || spawner.lastType === 'kangaroo';
  let spawnedWidth;
  let enemySpawned = false;

  if (roll < ditchProb) {
    // Ditch
    const w = cfg.ditchWMin + spawnRng() * (cfg.ditchWMax - cfg.ditchWMin);
    ditches.push({ x: W + 20, w });
    spawnedWidth = w;
    spawner.lastType = 'ditch';

  } else if (roll < ditchProb + lionProb && !noEnemy) {
    // Lion
    obstacles.push({ x: W + 20, y: GROUND_Y - 62, w: 58, h: 62, type: 'lion' });
    spawnedWidth = 58;
    enemySpawned = true;
    spawner.lastType = 'lion';

  } else if (roll < ditchProb + lionProb + vultureProb && !noEnemy) {
    // Vulture — oscillates vertically; starts randomly at bottom or top
    const vw = 68, vh = 44;
    const vYLow  = GROUND_Y - vh;
    const vYHigh = GROUND_Y - 195;
    const startTop = spawnRng() < 0.5;
    const waitBot  = 60 + Math.floor(spawnRng() * 60);
    const waitTop  = 50 + Math.floor(spawnRng() * 50);
    obstacles.push({
      x: W + 20,
      y: startTop ? vYHigh : vYLow,
      yLow: vYLow, yHigh: vYHigh,
      w: vw, h: vh, type: 'vulture',
      state: startTop ? 'top' : 'bottom',
      stateTimer: startTop ? waitTop : waitBot,
      waitBot, waitTop, flySpeed: 2.5,
    });
    spawnedWidth = vw;
    enemySpawned = true;
    spawner.lastType = 'vulture';

  } else if (roll < ditchProb + lionProb + vultureProb + kangProb && !noEnemy) {
    // Kangaroo — bounces left/right
    const kw = 52, kh = 68;
    obstacles.push({
      x: W + 20, y: GROUND_Y - kh, w: kw, h: kh, type: 'kangaroo',
      vy: 0, vx: 0, jumpTimer: 20 + Math.floor(spawnRng() * 20),
    });
    spawnedWidth = kw;
    enemySpawned = true;
    spawner.lastType = 'kangaroo';

  } else if (spawnRng() < (twoPlayer ? 0.52 : 0.35)) {
    // Floating platform with stepping-stone boxes
    const n = Math.max(2, Math.floor(spawnRng() * 5) + 2);
    spawnedWidth = spawnPlatform(n);
    spawner.lastType = 'platform';

  } else {
    // Box cluster — check actual positions: last box must be ≥ 5 boxes left of spawn point
    const spawnX      = W + 20;
    const minGapPx    = level >= 6 ? 5 * BOX_W : 2 * BOX_W;
    const lastBoxRight = obstacles.reduce(
      (mx, o) => o.type === 'box' ? Math.max(mx, o.x + o.w) : mx, -Infinity);
    const boxTooClose = lastBoxRight > spawnX - minGapPx;

    if (boxTooClose) {
      // Not enough room yet — spawn a platform instead and try boxes next time
      const n = Math.max(2, Math.floor(spawnRng() * 5) + 2);
      spawnedWidth = spawnPlatform(n);
      spawner.lastType = 'platform';
    } else {
      spawnedWidth = spawnBoxCluster();
      spawner.lastType = 'box';
    }
  }

  // Enemies need a large gap so stomp-bounce can't chain into the next obstacle
  const gapMin = enemySpawned ? Math.max(cfg.gapLo, 340) : cfg.gapLo;
  const gapPx  = gapMin + spawnRng() * Math.max(0, cfg.gapHi - gapMin);
  spawner.cd = Math.round((spawnedWidth + gapPx) / cfg.speed);

  // Occasionally scatter ground-level diamonds in the gap (clear of any obstacle)
  if (spawner.diamondBudget > 0 && spawner.lastType !== 'ditch' && spawnRng() < 0.45) {
    const count    = 1 + Math.floor(spawnRng() * 3);
    const gapStart = W + 20 + (spawnedWidth || 0) + 50;
    const spacing  = 44 + Math.floor(spawnRng() * 36);
    for (let i = 0; i < count && spawner.diamondBudget > 0; i++) {
      if (50 + i * spacing >= gapPx) break; // would reach next cluster — skip
      diamonds.push({ x: gapStart + i * spacing, y: GROUND_Y - 20,
                      color: DIAMOND.box.color, pts: DIAMOND.box.pts });
      spawner.diamondBudget--;
    }
  }
}

// ── Box cluster system ────────────────────────────────────────────────────────
// One contiguous block of adjacent columns with a mountain height profile.
// Gaps between blocks enforced by position check in spawnNext.

function chooseMaxHeight() {
  const r = spawnRng();
  if (level <= 2) return r < 0.35 ? 2 : 1;
  if (level <= 4) return r < 0.35 ? 1 : r < 0.70 ? 2 : 3;
  if (level === 5) return r < 0.20 ? 1 : r < 0.55 ? 2 : 3;
  return r < 0.15 ? 2 : r < 0.50 ? 3 : 4; // level 6
}

// Returns column-height array for one contiguous block.
// Heights form a ramp-up → peak → optional descent profile.
function generateBoxBlock(maxH) {
  const cols = [];
  if (maxH === 1) {
    const w = 1 + Math.floor(spawnRng() * 5);
    for (let i = 0; i < w; i++) cols.push(1);
  } else if (maxH === 2) {
    // Groups of h=2 separated by gaps ≥2 h=1 columns (single-column gaps are unreachable)
    if (spawnRng() < 0.4) cols.push(1);               // optional leading h=1
    const run1 = 1 + Math.floor(spawnRng() * 3);      // first h=2 run: 1–3 columns
    for (let i = 0; i < run1; i++) cols.push(2);
    if (spawnRng() < 0.5) {                            // optional second h=2 group
      const gap = 2 + Math.floor(spawnRng() * 2);     // gap ≥2 h=1 columns
      for (let i = 0; i < gap; i++) cols.push(1);
      const run2 = 1 + Math.floor(spawnRng() * 3);
      for (let i = 0; i < run2; i++) cols.push(2);
    }
    if (spawnRng() < 0.35) cols.push(1);              // optional trailing h=1
  } else if (maxH === 3) {
    // 2 stepping stones h=1, optional 2×h=2, peak, optional descent
    cols.push(1, 1);
    if (spawnRng() < 0.65) { cols.push(2, 2); }
    const peakW = 1 + Math.floor(spawnRng() * 3);
    for (let i = 0; i < peakW; i++) cols.push(3);
    const d = spawnRng();
    if (d < 0.33) { cols.push(2, 1); }
    else if (d < 0.66) { cols.push(2); }
  } else { // maxH === 4 — level 6 only
    // Always 2×h1 + 2×h2 before peak (CLAUDE.md rule)
    cols.push(1, 1, 2, 2);
    const peakW = 1 + Math.floor(spawnRng() * 3);
    for (let i = 0; i < peakW; i++) cols.push(4);
    const d = spawnRng();
    if (d < 0.50) { cols.push(2, 2, 1); }
    else if (d < 0.75) { cols.push(2, 2); }
  }
  return cols;
}

// Spawns one box cluster and its collectibles. Returns spawnedWidth in px.
function spawnBoxCluster() {
  const heights   = generateBoxBlock(chooseMaxHeight());
  const x0        = W + 20;
  const colTopY   = new Map();
  const colTopRef = new Map();

  for (let c = 0; c < heights.length; c++) {
    const h  = heights[c];
    const bx = x0 + c * BOX_W;
    for (let row = 0; row < h; row++) {
      const y   = GROUND_Y - BOX_H * (row + 1);
      const obj = { x: bx, y, w: BOX_W, h: BOX_H, type: 'box' };
      obstacles.push(obj);
      if (row === h - 1) { colTopY.set(bx, y); colTopRef.set(bx, obj); }
    }
  }

  if (level >= 2) {
    for (const obj of colTopRef.values()) {
      if (spawnRng() < 0.10) obj.trampoline = true;
    }
  }

  const singleCols = [...colTopY.entries()].filter(([, y]) => y === GROUND_Y - BOX_H);
  if (!spawner.potionSpawned && spawnRng() < 0.20 && singleCols.length > 0) {
    const [bx] = singleCols[Math.floor(spawnRng() * singleCols.length)];
    potions.push({ x: bx + BOX_W / 2, y: GROUND_Y - BOX_H - 22 });
    spawner.potionSpawned = true;
  }

  const rocketMax = twoPlayer ? 2 : 1;
  if (level >= 2 && spawner.rocketCount < rocketMax && spawnRng() < 0.10) {
    const allCols = [...colTopY.entries()];
    if (allCols.length > 0) {
      const [bx, topY] = allCols[Math.floor(spawnRng() * allCols.length)];
      rockets.push({ x: bx + BOX_W / 2, y: topY - 26 });
      spawner.rocketCount++;
    }
  }

  if (spawner.diamondBudget > 0 && spawnRng() < 0.55) {
    const cols     = [...colTopY.entries()];
    const count    = Math.min(spawner.diamondBudget, heights.length >= 4 ? 2 : 1);
    const shuffled = cols.sort(() => spawnRng() - 0.5).slice(0, count);
    for (const [bx, topY] of shuffled) {
      const floatExtra = spawnRng() < 0.3 ? 40 + spawnRng() * 60 : 0;
      diamonds.push({ x: bx + BOX_W / 2, y: topY - 26 - floatExtra,
                      color: DIAMOND.box.color, pts: DIAMOND.box.pts });
      spawner.diamondBudget--;
    }
  }

  return heights.length * BOX_W;
}


// Returns total spawned width (step + gap + platform + upper tiers) for spawner.cd calc.
function spawnPlatform(n) {
  const x0    = W + 20;
  const stepW = 2;                            // always 2 boxes wide (landable)
  const stepH = spawnRng() < 0.5 ? 1 : 2; // 1 or 2 boxes high
  const gap   = BOX_W;                        // 1-box gap between step and platform

  // Stepping-stone boxes (normal brown boxes)
  for (let row = 0; row < stepH; row++) {
    const y = GROUND_Y - BOX_H * (row + 1);
    for (let i = 0; i < stepW; i++) {
      obstacles.push({ x: x0 + i * BOX_W, y, w: BOX_W, h: BOX_H, type: 'box' });
    }
  }

  // Tier-1 floating platform
  const platX = x0 + stepW * BOX_W + gap;
  for (let i = 0; i < n; i++) {
    obstacles.push({ x: platX + i * BOX_W, y: PLATFORM_Y, w: BOX_W, h: BOX_H, type: 'platform' });
  }

  // Every 2nd platform gets tier-1 diamonds just above
  spawner.platformCount++;
  if (spawner.platformCount % 2 === 0) {
    for (let i = 0; i < n; i++) {
      diamonds.push({ x: platX + i * BOX_W + BOX_W / 2, y: PLATFORM_Y - 26,
                      color: DIAMOND.tier1.color, pts: DIAMOND.tier1.pts });
    }
  }

  // Rarely place a heart on this platform (max 1 per 2-level pair)
  if (!heartSpawned && spawnRng() < 0.25) {
    const hx = platX + Math.floor(spawnRng() * n) * BOX_W + BOX_W / 2;
    hearts.push({ x: hx, y: PLATFORM_Y - 18 });
    heartSpawned = true;
  }

  // Higher tiers — driven by PLATFORM_TIERS config
  let totalExtraWidth = 0;
  let prevX = platX;
  let prevN = n;

  for (const tier of PLATFORM_TIERS) {
    if (spawnRng() >= tier.spawnChance) break;
    const tn   = tier.minN + Math.floor(spawnRng() * (tier.maxN - tier.minN + 1));
    const tgap = BOX_W + Math.floor(spawnRng() * 2) * BOX_W;
    const tx   = prevX + prevN * BOX_W + tgap;
    for (let i = 0; i < tn; i++) {
      obstacles.push({ x: tx + i * BOX_W, y: tier.y, w: BOX_W, h: BOX_H, type: 'platform' });
    }
    if (spawnRng() < tier.diaChance) {
      const ri  = Math.floor(spawnRng() * tn);
      const def = DIAMOND[tier.diamond];
      diamonds.push({ x: tx + ri * BOX_W + BOX_W / 2, y: tier.y - 26,
                      color: def.color, pts: def.pts });
    }
    totalExtraWidth += tgap + tn * BOX_W;
    prevX = tx;
    prevN = tn;
  }

  return stepW * BOX_W + gap + n * BOX_W + totalExtraWidth;
}

// Returns true when no enemy/box obstacle occupies a horizontal window of ±margin around x
function obstaclesClearAt(x, margin) {
  return !obstacles.some(o => {
    if (o.type === 'flag' || o.type === 'platform') return false;
    const oc = o.x + (o.w || 0) / 2;
    return oc > 0 && Math.abs(oc - x) < margin;
  });
}

function overlaps(p, o) {
  const m = 11;
  return (p.x - PLAYER_SIZE / 2 + m) < (o.x + o.w - m) &&
         (p.x + PLAYER_SIZE / 2 - m) > (o.x + m) &&
         (p.y - PLAYER_SIZE + m)     < (o.y + o.h - m) &&
         (p.y - m)                   > (o.y + m);
}

// Central score function — always checks 1000-point milestones
function addScore(pts) {
  const prev = score;
  score += pts;
  const milestones = Math.floor(score / 1000) - Math.floor(prev / 1000);
  for (let i = 0; i < milestones; i++) {
    lives = Math.min(lives + 1, 9);
    greenFrames = 40;
    popups.push({ x: W / 2, y: H / 2 - 20, text: '❤️ +1 Leben!', life: 90, color: '#ff6b6b' });
  }
}

function stompP(p, o, pts = 100) {
  const cx = o.x + o.w / 2, cy = o.y;
  const barkBonus = (p.animalIdx === 1 && (o.frozenFrames || 0) > 0) ? 25 : 0;
  o.x = -600;
  playPunch();
  p.vy = JUMP_VY * 0.6;
  const total = pts + barkBonus;
  addScore(total);
  popups.push({ x: cx, y: cy, text: `+${total}`, life: 55, color: '#FFD700' });
}

function hitP(p, o) {
  o.x = -600;
  lives--;
  p.invFrames = 110;
  flashFrames = 18;
  if (lives <= 0) gs = 'gameover';
}

function fellIntoDitchP(p) {
  lives--;
  flashFrames = 22;
  if (lives <= 0) {
    gs = 'gameover';
  } else {
    restoreLevelSeed();
    initLevel();
    gs = 'playing';
  }
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (gs === 'select') { drawSelect(); return; }

  drawBackground();
  drawObstacles();
  drawDiamonds();
  drawHearts();
  drawPotions();
  drawRocketItems();
  drawClocks();
  drawHourglasses();
  drawParticles();
  drawShadowWolves();
  drawYarnBalls();
  drawPlayers();
  drawPopups();
  drawHUD();
  if (introFrames > 0) drawIntroHints();

  // Screen flash effects
  if (flashFrames > 0) {
    ctx.globalAlpha = flashFrames * 0.045;
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  if (greenFrames > 0) {
    ctx.globalAlpha = Math.min(0.13, greenFrames * 0.006);
    ctx.fillStyle = '#00dc50';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (gs === 'levelend') {
    drawOverlay(`🎉 Level ${level} geschafft!`,
      level >= 6 ? '▶ Weiter' : `▶ Level ${level + 1}`,
      `Punkte: ${score}`);
  } else if (gs === 'gameover') {
    drawOverlay('💀 Game Over', '🔄 Nochmal spielen',
      `Level ${level} · ${score} Punkte`);
  } else if (gs === 'win') {
    drawOverlay('🏆 Du hast gewonnen!', '🎮 Nochmal spielen',
      `${score} Punkte`);
  }
}

// ── Background ────────────────────────────────────────────────────────────────
function drawBackground() {
  const cfg = LEVEL_CFG[level - 1];

  // Sky gradient (cached in initLevel, no per-frame allocation)
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0, 0, W, GROUND_Y);

  if (level === 6) {
    // Moon
    const moonX = W - 80, moonY = 58;
    ctx.fillStyle = 'rgba(180,180,220,0.12)';
    ctx.beginPath(); ctx.arc(moonX, moonY, 46, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(200,200,240,0.22)';
    ctx.beginPath(); ctx.arc(moonX, moonY, 36, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#d8d8f0';
    ctx.beginPath(); ctx.arc(moonX, moonY, 26, 0, Math.PI * 2); ctx.fill();
    // Scrolling skyscrapers (behind everything)
    drawSkyscrapers();
  } else {
    // Sun glow — layered circles instead of shadowBlur (no GPU flicker)
    const sunX = W - 80, sunY = 58;
    const sunR = level >= 4 ? 26 : 32;
    for (let i = 5; i >= 1; i--) {
      ctx.fillStyle = cfg.sunGlow + (0.06 * i) + ')';
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR + i * 10, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = cfg.sunColor;
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    ctx.fill();

    // Clouds
    for (const c of clouds) drawCloud(c.x, c.y, c.r, level >= 4);

    // Scrolling hills (level 1) — hillOff is continuous, no modulo wrap-jump
    if (level === 1) {
      ctx.fillStyle = 'rgba(80,140,60,0.30)';
      const ho = hillOff % 200;
      for (let hx = -ho; hx < W + 200; hx += 200) {
        ctx.beginPath();
        ctx.arc(hx + 100, GROUND_Y, 90, Math.PI, 0);
        ctx.fill();
      }
    }

    // Forest background (level 2) — two parallax layers of trees
    if (level === 2) drawForest();

  }

  // Ground — drawn in segments, with gaps for ditches
  ctx.fillStyle = cfg.ground;
  let gx = 0;
  // Ditches are already in left→right order (spawned sequentially, scrolled at same speed)
  for (const d of ditches) {
    const dx = Math.max(0, d.x);
    if (dx > gx) ctx.fillRect(gx, GROUND_Y, dx - gx, H - GROUND_Y);
    gx = Math.min(W, d.x + d.w);
  }
  if (gx < W) ctx.fillRect(gx, GROUND_Y, W - gx, H - GROUND_Y);

  // Ditch: dark abyss + glowing floor + edge walls
  for (const d of ditches) {
    const dx = Math.max(0, d.x);
    const dw = Math.min(W, d.x + d.w) - dx;
    if (dw <= 0) continue;

    // Abyss background
    ctx.fillStyle = '#060008';
    ctx.fillRect(dx, GROUND_Y, dw, H - GROUND_Y);

    // Depth glow at bottom (lava-like on high levels, cold blue on low)
    const glowColor = level >= 4 ? 'rgba(200,40,0,0.55)' : 'rgba(60,0,120,0.45)';
    ctx.fillStyle = glowColor;
    ctx.fillRect(dx, H - 28, dw, 28);

    // Left wall
    ctx.fillStyle = '#333';
    ctx.fillRect(dx, GROUND_Y, 4, H - GROUND_Y);
    // Right wall
    ctx.fillStyle = '#222';
    ctx.fillRect(Math.min(W, d.x + d.w) - 4, GROUND_Y, 4, H - GROUND_Y);
  }

  // Ground top edge line
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  gx = 0;
  for (const d of ditches) {
    const dx = Math.max(0, d.x);
    if (dx > gx) ctx.fillRect(gx, GROUND_Y, dx - gx, 4);
    gx = Math.min(W, d.x + d.w);
  }
  if (gx < W) ctx.fillRect(gx, GROUND_Y, W - gx, 4);
}

function drawCloud(x, y, r, dark) {
  ctx.fillStyle = dark ? 'rgba(180,60,40,0.45)' : 'rgba(255,255,255,0.80)';
  ctx.beginPath();
  ctx.arc(x,            y,     r,        0, Math.PI * 2);
  ctx.arc(x + r * 0.80, y + 5, r * 0.65, 0, Math.PI * 2);
  ctx.arc(x - r * 0.70, y + 8, r * 0.60, 0, Math.PI * 2);
  ctx.fill();
}

// ── City skyline (level 6) ────────────────────────────────────────────────────
// Building layout within a 960px repeating tile (tiled seamlessly)
const CITY_BLDGS = [
  { dx:   0, w: 68, h: 310 },
  { dx:  78, w: 46, h: 215 },
  { dx: 133, w: 86, h: 385 },
  { dx: 228, w: 56, h: 265 },
  { dx: 293, w: 74, h: 425 },
  { dx: 376, w: 50, h: 245 },
  { dx: 435, w: 94, h: 340 },
  { dx: 538, w: 60, h: 285 },
  { dx: 608, w: 80, h: 365 },
  { dx: 697, w: 54, h: 225 },
  { dx: 760, w: 88, h: 410 },
  { dx: 857, w: 66, h: 305 },
];

function drawSkyscrapers() {
  const scroll = (hillOff * 0.55) % W;
  for (let rep = -1; rep <= 1; rep++) {
    for (const b of CITY_BLDGS) {
      const bx = b.dx - scroll + rep * W;
      if (bx + b.w < 0 || bx > W) continue;
      const by = GROUND_Y - b.h;
      // Building silhouette
      ctx.fillStyle = '#0c0c1e';
      ctx.fillRect(bx, by, b.w, b.h);
      // Faint edge highlight
      ctx.fillStyle = 'rgba(60,60,120,0.5)';
      ctx.fillRect(bx, by, 2, b.h);
      // Windows — deterministic grid
      const ww = 6, wh = 5, wgx = 10, wgy = 11;
      const cols = Math.max(1, Math.floor((b.w - 8) / wgx));
      const rows = Math.max(1, Math.floor((b.h - 18) / wgy));
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const lit = ((b.dx + r * 13 + c * 7) % 11) < 8;
          ctx.fillStyle = lit ? 'rgba(255,238,150,0.72)' : 'rgba(20,20,50,0.6)';
          ctx.fillRect(bx + 4 + c * wgx, by + 12 + r * wgy, ww, wh);
        }
      }
    }
  }
}

// Each layer is an array of { dx, trunkH, crownR } within a W-wide repeating tile.
const FOREST_BACK = [
  { dx:  30, trunkH: 95,  crownR: 38 },

  { dx: 710, trunkH: 135, crownR: 52 },
  { dx: 800, trunkH: 88,  crownR: 35 },
  { dx: 880, trunkH: 118, crownR: 43 },
];
const FOREST_FRONT = [
  { dx:  15, trunkH: 140, crownR: 55 },
  { dx: 130, trunkH: 160, crownR: 62 },
  { dx: 245, trunkH: 125, crownR: 50 },
  { dx: 355, trunkH: 170, crownR: 66 },

  { dx: 595, trunkH: 155, crownR: 60 },
  { dx: 715, trunkH: 130, crownR: 52 },
  { dx: 825, trunkH: 165, crownR: 64 },
];

function drawForestLayer(trees, scrollFactor, trunkColor, crownColor) {
  const scroll = (hillOff * scrollFactor) % W;
  for (let rep = -1; rep <= 1; rep++) {
    for (const t of trees) {
      const tx = t.dx - scroll + rep * W;
      if (tx + t.crownR * 2 < 0 || tx - t.crownR > W) continue;
      const baseY = GROUND_Y;
      const trunkW = Math.round(t.crownR * 0.22);
      // Trunk
      ctx.fillStyle = trunkColor;
      ctx.fillRect(tx - trunkW / 2, baseY - t.trunkH, trunkW, t.trunkH);
      // Crown — stacked circles for a full leafy look
      ctx.fillStyle = crownColor;
      ctx.beginPath();
      ctx.arc(tx,                    baseY - t.trunkH - t.crownR * 0.55, t.crownR,        0, Math.PI * 2);
      ctx.arc(tx - t.crownR * 0.55, baseY - t.trunkH - t.crownR * 0.25, t.crownR * 0.78, 0, Math.PI * 2);
      ctx.arc(tx + t.crownR * 0.55, baseY - t.trunkH - t.crownR * 0.25, t.crownR * 0.78, 0, Math.PI * 2);
      ctx.arc(tx,                    baseY - t.trunkH + t.crownR * 0.10, t.crownR * 0.70, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawForest() {
  // Back layer — smaller, lighter, slower parallax
  drawForestLayer(FOREST_BACK,  0.18, 'rgba(40,28,14,0.50)', 'rgba(34,80,28,0.45)');
  // Front layer — taller, darker, faster parallax (but still behind ground objects)
  drawForestLayer(FOREST_FRONT, 0.38, 'rgba(30,18,8,0.70)',  'rgba(22,60,18,0.65)');
}

// ── Explosion particles ────────────────────────────────────────────────────────
function drawParticles() {
  for (const pt of particles) {
    ctx.globalAlpha = (pt.life / pt.maxLife) * 0.9;
    ctx.fillStyle   = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.size * (pt.life / pt.maxLife), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Shadow wolves ─────────────────────────────────────────────────────────────
function drawShadowWolves() {
  for (const sw of shadowWolves) {
    ctx.save();
    ctx.globalAlpha = 0.55;
    // Draw using the wolf sprite (animalIdx=4) mirrored so it runs left
    ctx.translate(sw.x + sw.w / 2, sw.y);
    ctx.scale(-1, 1); // mirror to face left
    drawAnimalSprite(0, 0, 4, frame * 0.25, false);
    ctx.restore();
    // Blue-white trailing glow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#aabbff';
    ctx.beginPath();
    ctx.ellipse(sw.x + sw.w / 2, sw.y - sw.h / 2, sw.w * 0.7, sw.h * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Clock & hourglass collectibles ────────────────────────────────────────────
function drawClocks() {
  for (const c of clocks) {
    const bob = Math.sin(frame * 0.08 + c.x * 0.01) * 4;
    ctx.save();
    ctx.translate(c.x, c.y + bob);
    // Glow

    // Outer case
    ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.fillStyle = '#e6a800'; ctx.fill();
    ctx.strokeStyle = '#fff8cc'; ctx.lineWidth = 2; ctx.stroke();
    // Face
    ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2);
    ctx.fillStyle = '#fffde0'; ctx.fill();
    // Hour and minute hands
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(5, -4); ctx.stroke();
    // Center dot
    ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#333'; ctx.fill();
    // Crown/button on top
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#cc8800';
    ctx.fillRect(-3, -17, 6, 5);
    ctx.restore();

}

function drawHourglasses() {
  for (const h of hourglasses) {
    const bob = Math.sin(frame * 0.08 + h.x * 0.01) * 4;
    ctx.save();
    ctx.translate(h.x, h.y + bob);

    ctx.fillRect(-10, -16, 20, 3);
    ctx.fillRect(-10,  13, 20, 3);

    ctx.moveTo(-9, -13); ctx.lineTo(9, -13); ctx.lineTo(0, 0); ctx.closePath();
    ctx.fillStyle = '#ddeeff'; ctx.fill();
    // Sand falling
    ctx.fillStyle = '#f5d060';
    ctx.beginPath();
    ctx.moveTo(-9, -13); ctx.lineTo(9, -13); ctx.lineTo(0, -5); ctx.closePath();

    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-9, 13); ctx.lineTo(9, 13); ctx.closePath();

    ctx.beginPath();
    ctx.moveTo(-6, 13); ctx.lineTo(6, 13); ctx.lineTo(0, 6); ctx.closePath();

}

// ── Yarn balls (cat ability) ──────────────────────────────────────────────────
function drawYarnBalls() {
  for (const b of yarnBalls) {
    ctx.save();
    ctx.translate(b.x, b.y);
    // Ball body
    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fillStyle = '#ff66cc';
    ctx.fill();
    ctx.strokeStyle = '#cc0088';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Wound yarn lines (rotate with x position for rolling effect)
    ctx.strokeStyle = '#ff99ee';
    ctx.lineWidth = 1.5;
    const rot = (b.x * 0.18) % (Math.PI * 2);
    for (let i = 0; i < 3; i++) {
      const a = rot + i * Math.PI * 2 / 3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * b.r * 0.25, Math.sin(a) * b.r * 0.25);
      ctx.lineTo(Math.cos(a + 0.6) * b.r * 0.85, Math.sin(a + 0.6) * b.r * 0.85);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Rocket items (collectibles in the world) ──────────────────────────────────

// ── Hearts ────────────────────────────────────────────────────────────────────
function drawHearts() {

// ── Diamonds ──────────────────────────────────────────────────────────────────
function drawDiamonds() {
  for (const d of diamonds) {
    const high = d.pts >= DIAMOND.high.pts;
    const s = high ? 13 : 9;
    ctx.save();
    ctx.translate(d.x, d.y);

    // Pulsing glow for float-only diamonds
    if (high) {
      const pulse = 0.18 + 0.12 * Math.sin(frame * 0.12 + d.x * 0.05);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(0, 0, s * 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Main gem body
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s, 0);
    ctx.lineTo(0, s);
    ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.fill();
    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s * 0.55, -s * 0.1);
    ctx.lineTo(0, s * 0.15);
    ctx.lineTo(-s * 0.45, -s * 0.1);
    ctx.closePath();
    ctx.fill();
    // Outline
    ctx.strokeStyle = high                         ? 'rgba(200,150,0,0.9)'
                    : d.pts === DIAMOND.tier3.pts  ? 'rgba(160,0,220,0.9)'
                    : d.pts === DIAMOND.tier2.pts  ? 'rgba(200,0,60,0.8)'
                    :                                'rgba(0,160,220,0.8)';
    ctx.lineWidth = high ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s, 0);
    ctx.lineTo(0, s);
    ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.stroke();

    // Point label beneath high diamonds
    if (high) {
      ctx.fillStyle = 'rgba(255,220,80,0.85)';
      ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`+${DIAMOND.high.pts}`, 0, s + 10);
    }

    ctx.restore();
  }
}

function drawFrozenOverlay(o) {
  ctx.fillStyle = 'rgba(140, 210, 255, 0.42)';
  ctx.fillRect(o.x, o.y, o.w, o.h);
  const cx = o.x + o.w / 2, cy = o.y + o.h / 2;
  ctx.strokeStyle = 'rgba(200, 240, 255, 0.9)';
  ctx.lineWidth = 1.5;
  for (let a = 0; a < 3; a++) {
    const angle = a * Math.PI / 3;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * 9, cy + Math.sin(angle) * 9);
    ctx.lineTo(cx - Math.cos(angle) * 9, cy - Math.sin(angle) * 9);
    ctx.stroke();
  }
}

// ── Lion drawing ──────────────────────────────────────────────────────────────
function drawLion(o) {

  // Tail

  ctx.fillStyle = '#7A3800';
  ctx.beginPath(); ctx.arc(29, 13, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#C8A030';
  ctx.beginPath(); ctx.arc(29, 13, 4, 0, Math.PI * 2); ctx.fill();

  // Legs
  ctx.lineWidth = 6; ctx.strokeStyle = '#A07820';
  _l(-11, -15, -9); _l(-7, -15, -5); _l(7, -15, 6); _l(11, -15, 10);

  // Body
  ctx.fillStyle = '#C8A030';
  ctx.beginPath(); ctx.ellipse(2, -26, 20, 13, 0, 0, Math.PI * 2); ctx.fill();

  // Mane (layered: outer dark, inner mid)
  ctx.fillStyle = '#6B2D00';
  ctx.beginPath(); ctx.arc(-15, -38, 20, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#9B4A00';

  // Head
  ctx.fillStyle = '#D4A832';
  ctx.beginPath(); ctx.arc(-15, -38, 12, 0, Math.PI * 2); ctx.fill();

  // Muzzle
  ctx.fillStyle = '#E8C860';
  ctx.beginPath(); ctx.ellipse(-23, -34, 7, 5, 0.1, 0, Math.PI * 2); ctx.fill();

  // Nose
  ctx.fillStyle = '#7A3800';
  ctx.beginPath(); ctx.ellipse(-27, -36, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

  // Eye (amber with slit)
  ctx.fillStyle = '#E8A000';
  ctx.beginPath(); ctx.ellipse(-18, -41, 3.5, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a0800';
  ctx.beginPath(); ctx.ellipse(-18, -41, 1.2, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';

  ctx.fillStyle = '#FFB0A0';

  ctx.restore();

  // Warning badge
  ctx.fillStyle = '#ff2222';
  ctx.beginPath(); ctx.arc(cx, o.y - 13, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
  ctx.fillText('!', cx, o.y - 8);
