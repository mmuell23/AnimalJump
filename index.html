  // Warning badge
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.arc(cx, o.y - 8, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
  ctx.fillText('!', cx, o.y - 3);
}

// ── Vulture drawing ───────────────────────────────────────────────────────────
function drawVulture(o) {
  const cx = o.x + o.w / 2;
  const cy = o.y + o.h / 2;
  // Wing angle depends on movement state
  const flap = o.state === 'rising' ? -12 : o.state === 'falling' ? 8 : -3;

  ctx.save();
  ctx.translate(cx, cy);

  // Wings (left & right, same shape mirrored)
  ctx.fillStyle = '#1a1230';
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(side * 20, -14 + flap, side * 36, -2 + flap * 0.4);
    ctx.quadraticCurveTo(side * 22, 10, side * 4, 8);
    ctx.closePath();
    ctx.fill();
    // Wing feather tips
    ctx.fillStyle = '#2a2050';
    ctx.beginPath();
    ctx.moveTo(side * 28, -4 + flap * 0.4);
    ctx.quadraticCurveTo(side * 36, -8 + flap * 0.5, side * 40, 0 + flap * 0.3);
    ctx.quadraticCurveTo(side * 34, 4, side * 26, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#1a1230'; // reset for next side
  }

  // Body
  ctx.fillStyle = '#2c2040';
  ctx.beginPath();
  ctx.ellipse(0, 4, 10, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Neck + bald head (faces left — toward player)
  ctx.fillStyle = '#d4a070';
  ctx.beginPath();
  ctx.arc(-10, -4, 8, 0, Math.PI * 2);
  ctx.fill();

  // Hooked beak
  ctx.fillStyle = '#b89000';
  ctx.beginPath();
  ctx.moveTo(-17, -5);
  ctx.lineTo(-27, -2);
  ctx.lineTo(-25, 3);
  ctx.lineTo(-17, 0);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ff3300';
  ctx.beginPath();
  ctx.arc(-12, -6, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-11.5, -6, 1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Warning badge
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.arc(cx, o.y - 12, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('!', cx, o.y - 7);
}

// ── Obstacles ─────────────────────────────────────────────────────────────────
function drawObstacles() {
  // Box gradients created once per frame (reused for all boxes via translate)
  const _boxNormGrad = ctx.createLinearGradient(0, 0, BOX_W, BOX_H);
  _boxNormGrad.addColorStop(0, '#C87941');
  _boxNormGrad.addColorStop(1, '#7A4420');
  const _boxTramGrad = ctx.createLinearGradient(0, 0, BOX_W, BOX_H);
  _boxTramGrad.addColorStop(0, '#FF88BB');
  _boxTramGrad.addColorStop(1, '#CC1166');

  for (const o of obstacles) {
    if (o.type === 'box') {
      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(o.x + 5, o.y + o.h, o.w, 6);

      ctx.save();
      ctx.translate(o.x, o.y);
      if (o.trampoline) {
        // ── Trampolin-Kiste (rosa) ──────────────────────────────────────────
        ctx.fillStyle = _boxTramGrad;
        ctx.fillRect(0, 0, o.w, o.h);
        // Spring coils
        ctx.strokeStyle = '#FF44AA';
        ctx.lineWidth = 1.5;
        for (let si = 1; si <= 3; si++) {
          const sx = (o.w / 4) * si;
          ctx.beginPath(); ctx.moveTo(sx, 5); ctx.lineTo(sx, o.h - 5); ctx.stroke();
        }
        // Arrow hint (↑)
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('↑', o.w / 2, o.h - 8);
        // Highlight edge
        ctx.fillStyle = '#FFB0D4';
        ctx.fillRect(0, 0, o.w, 3);
        ctx.fillRect(0, 0, 3, o.h);
      } else {
        // ── Normal box ─────────────────────────────────────────────────────
        ctx.fillStyle = _boxNormGrad;
        ctx.fillRect(0, 0, o.w, o.h);
        // Cross stripes
        ctx.fillStyle = '#5C3010';
        ctx.fillRect(o.w / 2 - 2, 0,           4, o.h);
        ctx.fillRect(0,           o.h / 2 - 2, o.w, 4);
        // Highlight edge
        ctx.fillStyle = '#E8A060';
        ctx.fillRect(0, 0, o.w, 3);
        ctx.fillRect(0, 0, 3,   o.h);
      }
      ctx.restore();
    } else if (o.type === 'kangaroo') {
      drawKangaroo(o);
      if (o.frozenFrames > 0) drawFrozenOverlay(o);
    } else if (o.type === 'vulture') {
      drawVulture(o);
      if (o.frozenFrames > 0) drawFrozenOverlay(o);
    } else if (o.type === 'platform') {
      // Semi-transparent blue floating platform block
      ctx.fillStyle = 'rgba(50, 130, 255, 0.38)';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // Top surface highlight
      ctx.fillStyle = 'rgba(160, 210, 255, 0.55)';
      ctx.fillRect(o.x, o.y, o.w, 5);
      // Inner grid line (visual separation between cells)
      ctx.strokeStyle = 'rgba(100, 180, 255, 0.7)';
      ctx.lineWidth = 1;
      ctx.strokeRect(o.x + 0.5, o.y + 0.5, o.w - 1, o.h - 1);
    } else if (o.type === 'flag') {
      const px = o.x;
      const base = GROUND_Y;
      const poleH = 110;
      // Pole
      ctx.fillStyle = '#aaa';
      ctx.fillRect(px - 2, base - poleH, 4, poleH);
      // Waving flag banner (checkered finish flag)
      const fw = 36, fh = 24;
      const fy = base - poleH;
      const cols = 4, rows = 3;
      const cw = fw / cols, ch = fh / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#222';
          ctx.fillRect(px + 2 + c * cw, fy + r * ch, cw, ch);
        }
      }
      // Flag border
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(px + 2, fy, fw, fh);
      // Base ball
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.arc(px, base, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (o.type === 'lion') {
      drawLion(o);
      if (o.frozenFrames > 0) drawFrozenOverlay(o);
    }
  }
}

// ── Animal sprites ────────────────────────────────────────────────────────────
// Coord system: (0,0) = feet on ground, y-negative = up, animal faces RIGHT
// sw1/sw2 = foot displacement in px for each leg pair (opposite phase)
// jump = true when airborne → fixed pose instead of stride animation

function _l(hx, hy, sw) { // single leg: hip→foot as gentle curve
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.quadraticCurveTo(hx + sw * 0.4, hy * 0.4, hx + sw, 0);
  ctx.stroke();
}

function drawFox(sw1, sw2, jump) {
  const F='#E55A15', D='#B83D00', C='#F5E0C0', P='#FFB0A0';
  ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-11, -15, jump ? -9 : sw1); _l(-7, -15, jump ? -5 : sw2);
  _l(  8, -15, jump ?  7 : sw2); _l(12, -15, jump ? 11 : sw1);
  // Tail
  ctx.strokeStyle=F; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,-20); ctx.bezierCurveTo(-32,-18,-38,-36,-26,-46); ctx.stroke();
  ctx.strokeStyle='#eee'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-28,-42); ctx.lineTo(-24,-47); ctx.stroke();
  // Body
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(0,-24,21,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(4,-21,11,7,0.2,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(17,-33,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(24,-29,7,5,0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(29,-29,2.5,2,0,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(20,-35,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(21,-36,0.8,0,Math.PI*2); ctx.fill();
  // Ears
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.moveTo(9,-41); ctx.lineTo(6,-55); ctx.lineTo(17,-43); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(18,-43); ctx.lineTo(21,-56); ctx.lineTo(26,-43); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P;
  ctx.beginPath(); ctx.moveTo(10,-42); ctx.lineTo(8,-52); ctx.lineTo(16,-44); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(19,-44); ctx.lineTo(21,-53); ctx.lineTo(25,-44); ctx.closePath(); ctx.fill();
}

function drawDog(sw1, sw2, jump) {
  const F='#C48B2F', D='#8B6020', C='#F0D8A0';
  ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-11, -15, jump ? -10 : sw1); _l(-7, -15, jump ? -6 : sw2);
  _l(  8, -15, jump ?   8 : sw2); _l(12, -15, jump ? 12 : sw1);
  // Tail (wagging up)
  ctx.strokeStyle=F; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-17,-22); ctx.bezierCurveTo(-28,-15,-33,-28,-26,-38); ctx.stroke();
  // Body
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(0,-23,22,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(4,-20,12,7,0.2,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(17,-33,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(27,-29,8,6,0.1,0,Math.PI*2); ctx.fill();
  // Tongue
  ctx.fillStyle='#E05070'; ctx.beginPath(); ctx.ellipse(31,-24,3,4,0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.ellipse(33,-29,3,2.5,0,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(22,-36,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(23,-37,1,0,Math.PI*2); ctx.fill();
  // Floppy ears
  ctx.fillStyle=D;
  ctx.beginPath(); ctx.moveTo(9,-43); ctx.lineTo(5,-26); ctx.lineTo(14,-25); ctx.lineTo(18,-42); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(19,-43); ctx.lineTo(25,-26); ctx.lineTo(30,-28); ctx.lineTo(26,-43); ctx.closePath(); ctx.fill();
}

function drawCat(sw1, sw2, jump) {
  const F='#888', D='#555', C='#EEE', P='#FFB0C0';
  ctx.lineWidth=4; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-10, -14, jump ? -7 : sw1); _l(-6, -14, jump ? -4 : sw2);
  _l(  7, -14, jump ?  6 : sw2); _l(11, -14, jump ?  8 : sw1);
  // Tail (curling up)
  ctx.strokeStyle=F; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-17,-20); ctx.bezierCurveTo(-32,-18,-40,-30,-28,-50); ctx.stroke();
  // Body (slimmer)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(-1,-22,18,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(3,-19,9,6,0.2,0,Math.PI*2); ctx.fill();
  // Stripes
  ctx.strokeStyle=D; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-10,-14); ctx.lineTo(-12,-26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4,-13);  ctx.lineTo(-5,-25);  ctx.stroke();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(15,-32,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(22,-28,6,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=P; ctx.beginPath(); ctx.arc(26,-28,2,0,Math.PI*2); ctx.fill();
  // Eye (green cat eye with slit pupil)
  ctx.fillStyle='#3A3'; ctx.beginPath(); ctx.ellipse(19,-33,2.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(19,-33,1,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(20,-34,0.8,0,Math.PI*2); ctx.fill();
  // Whiskers
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(22,-27); ctx.lineTo(36,-25); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,-29); ctx.lineTo(36,-29); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,-31); ctx.lineTo(36,-33); ctx.stroke();
  // Ears
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.moveTo(6,-40);  ctx.lineTo(3,-55);  ctx.lineTo(15,-42); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(16,-42); ctx.lineTo(20,-56); ctx.lineTo(24,-43); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P;
  ctx.beginPath(); ctx.moveTo(7,-41);  ctx.lineTo(5,-51);  ctx.lineTo(14,-43); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(17,-43); ctx.lineTo(20,-52); ctx.lineTo(23,-44); ctx.closePath(); ctx.fill();
}

function drawDonkey(sw1, sw2, jump) {
  const F='#B8B8B8', D='#707070', C='#E8D8C0', M='#555';
  ctx.lineWidth=7; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-12, -18, jump ? -10 : sw1); _l(-7, -18, jump ?  -6 : sw2);
  _l(  8, -18, jump ?   8 : sw2); _l(13, -18, jump ?  12 : sw1);
  // Short tail with tuft
  ctx.strokeStyle=D; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-21,-21); ctx.lineTo(-31,-14); ctx.stroke();
  ctx.lineWidth=2;
  for (const a of [-0.5, 0, 0.5]) {
    ctx.beginPath(); ctx.moveTo(-31,-14);
    ctx.lineTo(-31 + Math.cos(a)*8, -14 + Math.sin(a)*8); ctx.stroke();
  }
  // Body (stocky)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(0,-24,24,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(3,-21,15,8,0.1,0,Math.PI*2); ctx.fill();
  // Mane
  ctx.strokeStyle=M; ctx.lineWidth=4; ctx.lineCap='round';
  for (let mx=5; mx<=15; mx+=4) {
    ctx.beginPath(); ctx.moveTo(mx,-33); ctx.lineTo(mx-1,-41); ctx.stroke();
  }
  // Head (elongated — faces RIGHT)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(19,-33,15,11,0.15,0,Math.PI*2); ctx.fill();
  // Large muzzle
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(31,-29,9,7,0.1,0,Math.PI*2); ctx.fill();
  // Nostrils
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.arc(29,-27,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(34,-27,1.5,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(23,-37,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(24,-38,1,0,Math.PI*2); ctx.fill();
  // LONG ears (donkey signature)
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.ellipse(12,-53,5,17,-0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(21,-53,5,17, 0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C;
  ctx.beginPath(); ctx.ellipse(12,-53,3,13,-0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(21,-53,3,13, 0.15,0,Math.PI*2); ctx.fill();
}

function drawWolf(sw1, sw2, jump) {
  const F='#607080', D='#3A4A58', L='#C8D4E0', C='#E0DDD8';
  ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-11, -16, jump ? -8 : sw1); _l(-7, -16, jump ? -5 : sw2);
  _l(  8, -16, jump ?  7 : sw2); _l(12, -16, jump ? 10 : sw1);
  // Tail (bushy, held low)
  ctx.strokeStyle=F; ctx.lineWidth=11; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,-20); ctx.bezierCurveTo(-28,-16,-34,-8,-28,-2); ctx.stroke();
  ctx.strokeStyle=L; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-30,-5); ctx.lineTo(-27,-1); ctx.stroke();
  // Body (lean)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(2,-24,22,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=L; ctx.beginPath(); ctx.ellipse(4,-21,14,6,0.1,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(19,-33,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(28,-30,8,5,0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(34,-30,2.5,2,0,0,Math.PI*2); ctx.fill();
  // Eye (yellow)
  ctx.fillStyle='#D4AA00'; ctx.beginPath(); ctx.arc(22,-36,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';    ctx.beginPath(); ctx.arc(22.5,-36,1.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';    ctx.beginPath(); ctx.arc(23,-37,0.7,0,Math.PI*2); ctx.fill();
  // Ears (pointed)
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.moveTo(11,-41); ctx.lineTo(8,-57);  ctx.lineTo(20,-44); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(21,-44); ctx.lineTo(25,-58); ctx.lineTo(28,-44); ctx.closePath(); ctx.fill();
  ctx.fillStyle=D;
  ctx.beginPath(); ctx.moveTo(12,-42); ctx.lineTo(10,-53); ctx.lineTo(19,-45); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(22,-45); ctx.lineTo(25,-54); ctx.lineTo(27,-45); ctx.closePath(); ctx.fill();
}

function drawMole(sw1, sw2, jump) {
  const F='#5C4033', D='#3E2723', S='#F48FB1', C='#8D6E63';
  // Stubby legs
  ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-10,-13,jump?-8:sw1); _l(-6,-13,jump?-4:sw2);
  _l(  8,-13,jump? 6:sw2); _l(12,-13,jump? 8:sw1);
  // Large front digging paws with claws
  ctx.fillStyle=C;
  ctx.beginPath(); ctx.ellipse(-19,-8,11,7,-0.4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=D; ctx.lineWidth=2; ctx.lineCap='round';
  for (let c=0;c<3;c++) {
    ctx.beginPath(); ctx.moveTo(-24+c*3,-4); ctx.lineTo(-26+c*3,1); ctx.stroke();
  }
  // Body (stocky)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(1,-22,22,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(3,-19,13,8,0.1,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(17,-31,12,0,Math.PI*2); ctx.fill();
  // Dark pointed snout (triangle tip)
  ctx.fillStyle=D;
  ctx.beginPath(); ctx.moveTo(18,-38); ctx.lineTo(18,-22); ctx.lineTo(48,-30); ctx.closePath(); ctx.fill();
  // Tiny eyes (moles have poor eyesight)
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(17,-33,1.8,0,Math.PI*2); ctx.fill();
  // Small round ears
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(9,-41,5,Math.PI,0); ctx.fill();
  ctx.fillStyle=S; ctx.beginPath(); ctx.arc(9,-41,3,Math.PI,0); ctx.fill();
}

const DRAW_FUNS = [drawFox, drawDog, drawCat, drawDonkey, drawWolf, drawMole];

function drawAnimalSprite(cx, groundY, idx, runT, onGround) {
  const t    = runT * Math.PI * 2;
  const sw1  = onGround ? Math.sin(t) * 11 : 0;
  const bob  = onGround ? Math.sin(t * 2) * 1.5 : 0; // subtle up-down on each step
  ctx.save();
  ctx.translate(cx, groundY + bob);
  DRAW_FUNS[idx](sw1, -sw1, !onGround);
  ctx.restore();
}

// ── Players ───────────────────────────────────────────────────────────────────
function drawRocketSprite(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  // Exhaust flame (animated)
  const fl = 0.7 + 0.3 * Math.sin(frame * 0.5);
  ctx.fillStyle = `rgba(255,200,0,${fl})`;
  ctx.beginPath();
  ctx.moveTo(-28, 0);
  ctx.lineTo(-28 - 26 * fl, -10 * fl);
  ctx.lineTo(-28 - 26 * fl,  10 * fl);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = `rgba(255,100,0,${fl * 0.7})`;
  ctx.beginPath();
  ctx.moveTo(-28, 0);
  ctx.lineTo(-28 - 18 * fl, -5 * fl);
  ctx.lineTo(-28 - 18 * fl,  5 * fl);
  ctx.closePath();
  ctx.fill();
  // Body (tinted with animal color)
  const ac = ANIMAL_COLORS[p.animalIdx];
  ctx.fillStyle = ac;
  ctx.beginPath();
  ctx.ellipse(0, 0, 28, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(-2, -5, 22, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // Nose cone
  ctx.fillStyle = '#ee3322';
  ctx.beginPath();
  ctx.moveTo(28, -13); ctx.lineTo(48, 0); ctx.lineTo(28, 13);
  ctx.closePath();
  ctx.fill();
  // Top fin
  ctx.fillStyle = '#cc1100';
  ctx.beginPath();
  ctx.moveTo(-14, -13); ctx.lineTo(-22, -30); ctx.lineTo(2, -13);
  ctx.closePath();
  ctx.fill();
  // Bottom fin
  ctx.beginPath();
  ctx.moveTo(-14,  13); ctx.lineTo(-22,  30); ctx.lineTo(2,  13);
  ctx.closePath();
  ctx.fill();
  // Window
  ctx.fillStyle = '#aaeeff';
  ctx.beginPath();
  ctx.arc(8, 0, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.arc(5, -3, 3.5, 0, Math.PI * 2);
  ctx.fill();
  // Timer bar
  const barW = 50;
  const ratio = p.rocketFrames / 600;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(-barW / 2, -28, barW, 5);
  ctx.fillStyle = `hsl(${30 + ratio * 30}, 100%, 55%)`;
  ctx.fillRect(-barW / 2, -28, barW * ratio, 5);
  ctx.restore();
}

function drawPlayers() {
  for (const p of players) {
    if (p.invFrames > 0 && Math.floor(p.invFrames / 7) % 2 === 1) continue;
    if (p.rocketFrames > 0) {
      drawRocketSprite(p);
      if (twoPlayer) {
        const label = p === players[0] ? 'P1' : 'P2';
        ctx.fillStyle = p === players[0] ? '#80ddff' : '#ffdd80';
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(label, p.x, p.y - 40);
      }
      continue;
    }
    if (p.floatFrames > 0) {
      const pulse = 0.25 + 0.15 * Math.sin(frame * 0.2);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#40ff80';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y - PLAYER_SIZE * 0.5, PLAYER_SIZE * 0.6, PLAYER_SIZE * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      const barW = 36;
      const ratio = p.floatFrames / 300;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 10, barW, 5);
      ctx.fillStyle = `hsl(${120 * ratio},100%,50%)`;
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 10, barW * ratio, 5);
    }
    if (p.animalIdx === 2 && p.scratchCooldown > 0) {
      const barW = 36, ratio = 1 - p.scratchCooldown / 180;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW, 5);
      ctx.fillStyle = '#ff44aa';
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW * ratio, 5);
    }
    if (p.animalIdx === 1 && p.barkCooldown > 0) {
      const barW = 36, ratio = 1 - p.barkCooldown / 300;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW, 5);
      ctx.fillStyle = `hsl(${50 + 70 * ratio},100%,55%)`;
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW * ratio, 5);
    }
    if (p.animalIdx === 4 && p.wolfCooldown > 0) {
      const barW = 36, ratio = 1 - p.wolfCooldown / 288;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW, 5);
      ctx.fillStyle = `hsl(${220 + 60 * ratio},80%,65%)`;
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW * ratio, 5);
    }
    if (p.animalIdx === 3 && p.donkeyBoxCD > 0) {
      const barW = 36, ratio = 1 - p.donkeyBoxCD / 300;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW, 5);
      ctx.fillStyle = `hsl(${30 + 60 * ratio},90%,55%)`;
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 18, barW * ratio, 5);
    }
    if (p.animalIdx === 5) {
      if (p.moleCooldown > 0) {
        // Cooldown active — show refill progress bar above player label
        const barW = 36, ratio = 1 - p.moleCooldown / 600;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 34, barW, 6);
        ctx.fillStyle = `hsl(${ratio * 120},90%,55%)`;
        ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 34, barW * ratio, 6);
      } else {
        // Show remaining box run-throughs as number badge above player label
        const col = p.moleBoxes >= 4 ? '#a0d080' : p.moleBoxes >= 2 ? '#ffcc44' : '#ff6644';
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.beginPath();
        ctx.arc(p.x, p.y - PLAYER_SIZE - 26, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = col;
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.moleBoxes, p.x, p.y - PLAYER_SIZE - 22);
      }
    }
    drawAnimalSprite(p.x, p.y, p.animalIdx, p.runT, p.onGround);
    if (twoPlayer) {
      const label = p === players[0] ? 'P1' : 'P2';
      ctx.fillStyle = p === players[0] ? '#80ddff' : '#ffdd80';
      ctx.font = 'bold 11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(label, p.x, p.y - PLAYER_SIZE - 4);
    }
  }
}

// ── Floating score popups ─────────────────────────────────────────────────────
function drawPopups() {
  for (const p of popups) {
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.fillStyle   = p.color;
    ctx.font        = p.text.length > 5 ? 'bold 22px Arial' : 'bold 26px Arial';
    ctx.textAlign   = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ── HUD helpers ───────────────────────────────────────────────────────────────
function drawHeart(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + r * 0.4);
  ctx.bezierCurveTo(x,           y - r * 0.5, x - r * 1.4, y - r * 0.5, x - r * 1.4, y + r * 0.2);
  ctx.bezierCurveTo(x - r * 1.4, y + r,       x,           y + r * 1.5, x,            y + r * 1.5);
  ctx.bezierCurveTo(x,           y + r * 1.5, x + r * 1.4, y + r,       x + r * 1.4,  y + r * 0.2);
  ctx.bezierCurveTo(x + r * 1.4, y - r * 0.5, x,           y - r * 0.5, x,            y + r * 0.4);
  ctx.fill();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Lives (drawn hearts — no emoji rendering)
  for (let i = 0; i < Math.max(lives, 3); i++) {
    drawHeart(18 + i * 32, 20, 11, i < lives ? '#e74c3c' : '#444');
  }

  // Score (center top)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  rrect(W / 2 - 70, 8, 140, 36, 8); ctx.fill();
  ctx.fillStyle = '#f5c842';
  ctx.font      = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`★ ${score}`, W / 2, 33);

  // Level badge (top right)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  rrect(W - 118, 8, 110, 36, 8); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font      = 'bold 17px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`Level ${level} / ${LEVEL_CFG.length}`, W - 12, 33);

  // Progress bar
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(14, H - 22, W - 28, 10);
  ctx.fillStyle = level >= 4 ? '#e74c3c' : '#27ae60';
  ctx.fillRect(14, H - 22, (W - 28) * Math.min(frame / LEVEL_FRAMES, 1), 10);

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font      = '11px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('Ziel ▶', W - 14, H - 26);

  // Active time-effect indicators
  if (clockFrames > 0) {
    const secs = Math.ceil(clockFrames / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    rrect(14, 52, 110, 26, 6); ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 13px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`⚡ 2× Tempo  ${secs}s`, 22, 70);
  }
  if (hourglassFrames > 0) {
    const secs = Math.ceil(hourglassFrames / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    rrect(14, 52, 120, 26, 6); ctx.fill();
    ctx.fillStyle = '#88aaff';
    ctx.font = 'bold 13px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`🐢 Zeitlupe  ${secs}s`, 22, 70);
  }

  // Virtual buttons (mobile only)
  if (isMobile) drawMobileButtons();
}

function drawMobileButtons() {
  const defs = [
    { key: 'left',    label: '◀', color: '#2255cc' },
    { key: 'right',   label: '▶', color: '#2255cc' },
    { key: 'special', label: '★', color: '#884400' },
    { key: 'jump',    label: '▲', color: '#226622' },
  ];
  for (const { key, label, color } of defs) {
    const b       = MB[key];
    const pressed = pressedButtons.has(key);
    ctx.globalAlpha = pressed ? 0.80 : 0.45;
    ctx.fillStyle   = color;
    rrect(b.x, b.y, b.w, b.h, 14); ctx.fill();
    ctx.globalAlpha = pressed ? 0.95 : 0.60;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 2;
    rrect(b.x, b.y, b.w, b.h, 14); ctx.stroke();
    ctx.globalAlpha = pressed ? 1.0 : 0.75;
    ctx.fillStyle   = '#ffffff';
    ctx.font        = 'bold 28px Arial';
    ctx.textAlign   = 'center';
    ctx.fillText(label, b.x + b.w / 2, b.y + b.h / 2 + 10);
  }
  ctx.globalAlpha = 1;
}

// ── Overlays ──────────────────────────────────────────────────────────────────
function drawOverlay(title, btnLabel, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  const bw = 440, bh = sub ? 238 : 210;
  const bx = W / 2 - bw / 2;
  const by = H / 2 - bh / 2;

  ctx.fillStyle   = '#10102a';
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth   = 3;
  rrect(bx, by, bw, bh, 20);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#f5c842';
  ctx.font      = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(title, W / 2, by + 58);

  if (sub) {
    ctx.fillStyle = '#ccc';
    ctx.font      = '19px Arial';
    ctx.fillText(sub, W / 2, by + 100);
  }

  const bby = by + bh - 64;
  ctx.fillStyle = '#218a45';
  rrect(W / 2 - 115, bby, 230, 48, 12); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font      = 'bold 20px Arial';
  ctx.fillText(btnLabel, W / 2, bby + 32);

  ctx.fillStyle = '#555';
  ctx.font      = '13px Arial';
  ctx.fillText('Klick oder ENTER zum Fortfahren', W / 2, by + bh + 22);
}

// ── Intro hints ───────────────────────────────────────────────────────────────
function drawIntroHints() {
  const alpha = Math.min(1, introFrames / 50);
  ctx.save();
  ctx.globalAlpha = alpha;

  const cols = twoPlayer ? 2 : 1;
  const defs = [
    { p: players[0], jumpKey: '↑',   moveKeys: '← →', dnKey: '↓' },
    { p: players[1], jumpKey: 'W',   moveKeys: 'A D',  dnKey: 'S'  },
  ].slice(0, cols);

  const bW   = twoPlayer ? 430 : 460;
  const bH   = 106;
  const gap  = 20;
  const totalW = cols * bW + (cols - 1) * gap;
  let   bX   = (W - totalW) / 2;
  const bY   = 80;
  const lineH = 22;

  for (const { p, jumpKey, moveKeys, dnKey } of defs) {
    const hint       = ANIMAL_HINT[p.animalIdx];
    const isP1       = p === players[0];
    const labelColor = isP1 ? '#80ddff' : '#ffdd80';
    const borderCol  = isP1 ? 'rgba(128,221,255,0.55)' : 'rgba(255,221,128,0.55)';

    ctx.fillStyle = 'rgba(0,0,0,0.68)';
    rrect(bX, bY, bW, bH, 12); ctx.fill();
    ctx.strokeStyle = borderCol;
    ctx.lineWidth   = 2;
    rrect(bX, bY, bW, bH, 12); ctx.stroke();

    const tx  = bX + 18;
    let   ty  = bY + 22;

    // Player label (2-player only)
    if (twoPlayer) {
      ctx.font      = 'bold 13px Arial';
      ctx.fillStyle = labelColor;
      ctx.textAlign = 'left';
      ctx.fillText(isP1 ? 'Spieler 1' : 'Spieler 2', tx, ty);
      ty += lineH;
    }

    // Each control line: key in yellow, function in white
    const rows = [
      [jumpKey + ':',         'Springen'],
      [moveKeys + ':',        'Laufen'],
      ['Special:',           hint[2]],
    ];
    for (const [key, fn] of rows) {
      ctx.textAlign = 'left';
      ctx.font      = 'bold 15px Arial';
      ctx.fillStyle = '#ffe060';
      ctx.fillText(key, tx, ty);
      const keyW = ctx.measureText(key).width;
      ctx.font      = '15px Arial';
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillText(' ' + fn, tx + keyW, ty);
      ty += lineH;
    }

    bX += bW + gap;
  }

  ctx.restore();
}

// ── Select screen (combined: P1 + P2 tier selection + mode buttons) ───────────
function drawSelect() {
  ctx.drawImage(starsBg, 0, 0);

  // Title
  ctx.font        = 'bold 42px Arial';
  ctx.textAlign   = 'center';
  ctx.strokeStyle = '#7a5200';
  ctx.lineWidth   = 5;
  ctx.strokeText('🌟 Tierabenteuer 🌟', W / 2, 42);
  ctx.fillStyle   = '#f5c842';
  ctx.fillText('🌟 Tierabenteuer 🌟', W / 2, 42);

  // ── Animal card rows ───────────────────────────────────────────────────────
  const rowDefs = [
    { label: 'Spieler 1', labelColor: '#80ddff', rowY: SEL_P1_Y, selIdx: selAnimal  },
    ...(!isMobile ? [{ label: 'Spieler 2', labelColor: '#ffdd80', rowY: SEL_P2_Y, selIdx: selAnimal2 }] : []),
  ];

  for (const { label, labelColor, rowY, selIdx } of rowDefs) {
    // Row label
    ctx.fillStyle = labelColor;
    ctx.font      = 'bold 13px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(label, SEL_SX, rowY - 6);

    // Cards
    const cards = getCardRects(rowY);
    for (let i = 0; i < ANIMALS.length; i++) {
      const c   = cards[i];
      const sel = i === selIdx;

      ctx.fillStyle = sel ? 'rgba(243,156,18,0.35)' : 'rgba(0,0,0,0.3)';
      ctx.fillRect(c.x + 3, c.y + 3, c.w, c.h);

      ctx.fillStyle   = sel ? '#2d4a22' : '#1e2a4a';
      ctx.strokeStyle = sel ? '#f5c842' : '#3a4a6a';
      ctx.lineWidth   = sel ? 3 : 1.5;
      rrect(c.x, c.y, c.w, c.h, 10);
      ctx.fill(); ctx.stroke();

      ctx.save();
      ctx.translate(c.x + c.w / 2, c.y + 80);
      ctx.scale(0.82, 0.82);
      DRAW_FUNS[i](6, -6, false);
      ctx.restore();

      ctx.fillStyle = sel ? '#f5c842' : '#99aacc';
      ctx.font      = sel ? 'bold 15px Arial' : '14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(ANIMALS[i].name, c.x + c.w / 2, c.y + SEL_CH - 5);

      if (sel) {
        ctx.fillStyle = '#f5c842';
        ctx.font      = 'bold 15px Arial';
        ctx.fillText('✓', c.x + c.w / 2, c.y + 14);
      }
    }
  }

  // ── Mode buttons ───────────────────────────────────────────────────────────
  const btns = isMobile
    ? [{ btn: { x: W / 2 - 100, y: SEL_BTN_Y, w: 200, h: 50 }, label: '▶  Spielen' }]
    : [
        { btn: getTwoPlayerBtn(), label: '🧍  1 Spieler' },
        { btn: getSoloBtn(),      label: '👥  2 Spieler' },
      ];
  for (const { btn, label } of btns) {
    ctx.fillStyle = 'rgba(39,174,96,0.28)';
    rrect(btn.x - 4, btn.y - 4, btn.w + 8, btn.h + 8, 18); ctx.fill();
    ctx.fillStyle   = '#218a45';
    ctx.strokeStyle = '#2ecc71';
    ctx.lineWidth   = 2;
    rrect(btn.x, btn.y, btn.w, btn.h, 14);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font      = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(label, btn.x + btn.w / 2, btn.y + btn.h / 2 + 7);
  }

  // ── Controls panel ─────────────────────────────────────────────────────────
  const ctrlY = SEL_BTN_Y + 60;

  if (isMobile) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    rrect(W / 2 - 220, ctrlY - 6, 440, 70, 10); ctx.fill();
    const mrows = ['◀ ▶  Laufen', '▲  Springen (halten = höher)', '★  Sonderfähigkeit'];
    ctx.font      = '13px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.80)';
    mrows.forEach((row, i) => ctx.fillText(row, W / 2, ctrlY + 18 + i * 18));
  } else {
    const colW = 210;
    const col1 = W / 2 - colW - 16;
    const col2 = W / 2 + 16;

    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    rrect(col1 - 12, ctrlY - 6, colW * 2 + 56, 88, 10); ctx.fill();

    ctx.font      = 'bold 12px Arial';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#80ddff';
    ctx.fillText('Spieler 1', col1, ctrlY + 11);
    ctx.fillStyle = '#ffdd80';
    ctx.fillText('Spieler 2', col2, ctrlY + 11);

    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(W / 2 - 1, ctrlY, 2, 78);

    const rows = [
      ['↑  Springen',           'W  Springen'],
      ['← →  Laufen',          'A D  Laufen'],
      ['↑ ↓  Schweben (Trank)', 'W S  Schweben (Trank)'],
    ];
    ctx.font      = '11px Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    rows.forEach((row, i) => {
      ctx.fillText(row[0], col1, ctrlY + 26 + i * 17);
      ctx.fillText(row[1], col2, ctrlY + 26 + i * 17);
    });
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.font      = '10px Arial';
  ctx.fillText('Löwe/Geier springen +100/+150  ·  Graben überspringen +20  ·  1000 Punkte = +1 Leben', W / 2, ctrlY + 82);
}

// ── Utility ───────────────────────────────────────────────────────────────────
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
const FIXED_STEP = 1000 / 60; // 16.67 ms per logic tick
let   _lastTime  = 0;
let   _accum     = 0;

function loop(timestamp) {
  const delta = Math.min(timestamp - _lastTime, 100); // cap: avoid spiral of death
  _lastTime   = timestamp;
  _accum     += delta;

  while (_accum >= FIXED_STEP) {
    update();
    _accum -= FIXED_STEP;
  }

  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
