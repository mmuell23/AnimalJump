<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tierabenteuer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(255, 160, 50, 0.3);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 960;
const H = canvas.height = 540;

const GROUND_Y    = H - 80;
const PLAYER_X    = 130;
const PLAYER_X2   = 240;
const PLAYER_SIZE = 52;
const GRAVITY     = 0.65;
const JUMP_VY     = -15;
const MOVE_SPEED  = 3.5;   // horizontal walk speed (px/frame)
const LEVEL_FRAMES = 2400;
// Platform floats high enough to walk under (head clearance ~60px) and low enough to jump onto
const PLATFORM_Y  = GROUND_Y - 160; // feet=370, head=318, platform bottom=256 → 62px gap
const PLATFORM_Y2 = PLATFORM_Y - 100; // second tier: reachable from P1, not from ground
const PLATFORM_Y3 = PLATFORM_Y2 - 90; // third tier: reachable from P2, ~y=110

// ── Pre-render static assets ──────────────────────────────────────────────────
// Stars background (drawn once, reused every frame on select screen)
const starsBg = document.createElement('canvas');
starsBg.width = W; starsBg.height = H;
(function () {
  const sc = starsBg.getContext('2d');
  const g = sc.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0d1b3e');
  g.addColorStop(1, '#1a1a3e');
  sc.fillStyle = g;
  sc.fillRect(0, 0, W, H);
  for (let i = 0; i < 70; i++) {
    const sx = (i * 139 + 11) % W;
    const sy = (i * 71  +  7) % Math.round(H * 0.65);
    const sr = (i % 4 === 0) ? 1.8 : 1;
    sc.fillStyle = `rgba(255,255,255,${0.3 + (i % 3) * 0.15})`;
    sc.beginPath();
    sc.arc(sx, sy, sr, 0, Math.PI * 2);
    sc.fill();
  }
})();

// ── Data ──────────────────────────────────────────────────────────────────────
const ANIMALS = [
  { name: 'Fuchs'  },
  { name: 'Hund'   },
  { name: 'Katze'  },
  { name: 'Esel'   },
  { name: 'Wolf'   },
];

// ditchWMax = 70% of max jump distance (speed × airtime ~46 frames) → always crossable
// gapLo/Hi: pixel gap between spawned elements (converted to frames via /speed)
const LEVEL_CFG = [
  { speed: 3.5, lionRatio: 0.12, gapLo: 130, gapHi: 240,
    sky1: '#5fa8d3', sky2: '#b8e0ff', ground: '#5a9a3a',
    sunColor: '#FFD700', sunGlow: 'rgba(255,220,80,',
    ditchWMin: 60, ditchWMax: 108 },
  { speed: 4.5, lionRatio: 0.22, gapLo: 115, gapHi: 220,
    sky1: '#87CEEB', sky2: '#C9EAFF', ground: '#4a8a2a',
    sunColor: '#FFD700', sunGlow: 'rgba(255,220,80,',
    ditchWMin: 65, ditchWMax: 138 },
  { speed: 5.5, lionRatio: 0.35, gapLo: 100, gapHi: 200,
    sky1: '#e07540', sky2: '#ffc060', ground: '#8B7355',
    sunColor: '#FF8C00', sunGlow: 'rgba(255,140,0,',
    ditchWMin: 70, ditchWMax: 168 },
  { speed: 6.5, lionRatio: 0.48, gapLo:  88, gapHi: 180,
    sky1: '#b03000', sky2: '#ff6a1a', ground: '#6B3A1A',
    sunColor: '#FF4500', sunGlow: 'rgba(255,80,0,',
    ditchWMin: 75, ditchWMax: 196 },
  { speed: 8.0, lionRatio: 0.62, gapLo:  75, gapHi: 160,
    sky1: '#5c0000', sky2: '#bb1800', ground: '#3a1000',
    sunColor: '#ff2200', sunGlow: 'rgba(255,40,0,',
    ditchWMin: 80, ditchWMax: 238 },
];

// ── Diamond type registry ──────────────────────────────────────────────────────
const DIAMOND = {
  box:   { color: '#38c8ff', pts: 10  },
  tier1: { color: '#38c8ff', pts: 10  },
  tier2: { color: '#ff2244', pts: 30  },
  tier3: { color: '#cc44ff', pts: 50  },
  high:  { color: '#FFD700', pts: 20 },
};

// ── Platform tier config — drives spawnPlatform() loop ────────────────────────
// Each entry: one higher platform level; spawnChance = prob given previous tier exists
const PLATFORM_TIERS = [
  { y: PLATFORM_Y2, minN: 1, maxN: 3, spawnChance: 0.45, diaChance: 0.5, diamond: 'tier2' },
  { y: PLATFORM_Y3, minN: 1, maxN: 2, spawnChance: 0.60, diaChance: 1.0, diamond: 'tier3' },
];

// ── State ─────────────────────────────────────────────────────────────────────
let gs          = 'select'; // 'select'|'select2'|'playing'|'levelend'|'gameover'|'win'
let selAnimal   = 0;
let selAnimal2  = 0;
let twoPlayer   = false;
let level       = 1;
let lives       = 3;
let score       = 0;
let frame       = 0;
let gScroll     = 0;
let hillOff     = 0;
let flashFrames = 0;
let greenFrames = 0;
let players     = [];
let obstacles   = [];
let ditches     = [];
let diamonds    = [];
let potions     = [];
let hearts      = [];
// Spawn state consolidated into one object (reset in initLevel)
let spawner = {
  cd: 160,          // unified spawn-stream cooldown (frames)
  lastType: '',     // prevents two enemies in a row
  platformCount: 0, // increments each platform spawn; every 2nd gets tier-1 diamonds
  diamondBudget: 0, // ground/box diamonds left for this level
  potionSpawned: false,
  highDiaCD: 0,     // countdown until next high-diamond cluster
};
let heartSpawned     = false; // max 1 heart per 2-level pair
let popups      = []; // floating score texts
let clouds      = [
  { x: 90,  y: 55,  r: 55 },
  { x: 330, y: 42,  r: 40 },
  { x: 570, y: 72,  r: 65 },
  { x: 730, y: 38,  r: 34 },
];
const keys = {}; // live key state for float mode

// ── Player factory ────────────────────────────────────────────────────────────
function makePlayer(x, animalIdx) {
  return {
    x, y: GROUND_Y, vy: 0, vx: 0, onGround: true, runT: 0,
    animalIdx,
    invFrames: 0, floatFrames: 0,
    jumpHeld: false, jumpBoost: 0,
    pendingDitchBonus: false,
  };
}

// ── Sound ──────────────────────────────────────────────────────────────────────
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}

function playJump() {
  try {
    const ac = getAC();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    const t = ac.currentTime;
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(520, t + 0.18);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.start(t); osc.stop(t + 0.22);
  } catch(e) {}
}

function playStep() {
  try {
    const ac = getAC();
    const bufLen = Math.floor(ac.sampleRate * 0.04);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 300;
    filter.Q.value = 0.8;
    src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.18, ac.currentTime);
    src.start(ac.currentTime);
  } catch(e) {}
}

function playPunch() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    // Low thud: short sine burst at ~80 Hz dropping fast
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
    // High crack: noise burst layered on top
    const bufLen = Math.floor(ac.sampleRate * 0.03);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const g2 = ac.createGain();
    src.connect(g2); g2.connect(ac.destination);
    g2.gain.setValueAtTime(0.3, t);
    src.start(t);
  } catch(e) {}
}

function playPling() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400, t);
    osc.frequency.setValueAtTime(1800, t + 0.02);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.start(t); osc.stop(t + 0.28);
  } catch(e) {}
}

function playHeart() {
  try {
    const ac = getAC();
    const t  = ac.currentTime;
    [523, 659, 784].forEach((freq, i) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const st = t + i * 0.13;
      gain.gain.setValueAtTime(0.001, st);
      gain.gain.linearRampToValueAtTime(0.22, st + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, st + 0.25);
      osc.start(st); osc.stop(st + 0.28);
    });
  } catch(e) {}
}

function playPotion() {
  try {
    const ac = getAC();
    const t  = ac.currentTime;
    // Bubbling: three quick low blurps
    [180, 220, 160].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 600;
      osc.connect(filt); filt.connect(gain); gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, t + i * 0.08);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + i * 0.08 + 0.1);
      gain.gain.setValueAtTime(0.18, t + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.14);
      osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.15);
    });
  } catch(e) {}
}

function playPuff() {
  try {
    const ac = getAC();
    const bufLen = Math.floor(ac.sampleRate * 0.08);
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.5);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 0.5;
    src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.3, ac.currentTime);
    src.start(ac.currentTime);
  } catch(e) {}
}

function playBoing() {
  try {
    const ac = getAC();
    const t  = ac.currentTime;
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(140, t);
    osc.frequency.exponentialRampToValueAtTime(520, t + 0.12);
    osc.frequency.exponentialRampToValueAtTime(320, t + 0.32);
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    osc.start(t); osc.stop(t + 0.38);
  } catch(e) {}
}

// ── Input ─────────────────────────────────────────────────────────────────────
function tryJump(p) {
  if (gs === 'playing' && p.onGround && p.floatFrames === 0) {
    p.vy       = -8;
    p.onGround = false;
    p.jumpHeld  = true;
    p.jumpBoost = 14;
    playJump();
  }
}

function releaseJump(p) { p.jumpHeld = false; }

// ── Keyboard
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' ||
      e.code === 'ArrowUp'   || e.code === 'ArrowDown') {
    e.preventDefault();
  }
  if (e.code === 'ArrowUp') {
    if      (gs === 'playing' && players.length > 0 && players[0].floatFrames === 0) tryJump(players[0]);
    else if (gs === 'levelend')                 advanceLevel();
    else if (gs === 'gameover' || gs === 'win') gs = 'select';
  }
  if (e.code === 'KeyW') {
    e.preventDefault();
    if (gs === 'playing' && players.length > 1 && players[1].floatFrames === 0) tryJump(players[1]);
  }
  if (e.code === 'Enter') {
    if      (gs === 'levelend')                 advanceLevel();
    else if (gs === 'gameover' || gs === 'win') gs = 'select';
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ArrowUp' && players.length > 0) releaseJump(players[0]);
  if (e.code === 'KeyW'    && players.length > 1) releaseJump(players[1]);
});

// ── Mouse: mousedown starts jump (for variable height), click handles UI
canvas.addEventListener('mousedown', e => {
  if (gs === 'playing' && players.length > 0) tryJump(players[0]);
});
canvas.addEventListener('mouseup', () => { if (players.length > 0) releaseJump(players[0]); });
canvas.addEventListener('click', e => {
  if (gs === 'playing') return; // handled by mousedown
  const r  = canvas.getBoundingClientRect();
  handleUIClick((e.clientX - r.left) * W / r.width,
                (e.clientY - r.top)  * H / r.height);
});

// ── Touch: touchstart begins jump, touchend releases boost and handles UI taps
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gs === 'playing' && players.length > 0) tryJump(players[0]);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (players.length > 0) releaseJump(players[0]);
  const r  = canvas.getBoundingClientRect();
  const t  = e.changedTouches[0];
  const mx = (t.clientX - r.left) * W / r.width;
  const my = (t.clientY - r.top)  * H / r.height;
  if (gs !== 'playing') handleUIClick(mx, my);
}, { passive: false });

function handleUIClick(mx, my) {
  if (gs === 'levelend')                     { advanceLevel(); return; }
  if (gs === 'gameover' || gs === 'win')     { gs = 'select'; return; }
  if (gs === 'select') {
    const cards = getCardRects();
    for (let i = 0; i < 5; i++) {
      const c = cards[i];
      if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
        selAnimal = i; return;
      }
    }
    const sb = getStartBtn();
    if (mx >= sb.x && mx <= sb.x + sb.w && my >= sb.y && my <= sb.y + sb.h) {
      gs = 'select2'; return;
    }
  }
  if (gs === 'select2') {
    const cards = getCardRects();
    for (let i = 0; i < 5; i++) {
      const c = cards[i];
      if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
        selAnimal2 = i; return;
      }
    }
    const b2 = getTwoPlayerBtn();
    if (mx >= b2.x && mx <= b2.x + b2.w && my >= b2.y && my <= b2.y + b2.h) {
      twoPlayer = true; startGame(); return;
    }
    const b1 = getSoloBtn();
    if (mx >= b1.x && mx <= b1.x + b1.w && my >= b1.y && my <= b1.y + b1.h) {
      twoPlayer = false; startGame(); return;
    }
  }
}

// ── Layout helpers ────────────────────────────────────────────────────────────
function getCardRects() {
  const cw = 90, ch = 115, gap = 10;
  const sx = (W - (5 * cw + 4 * gap)) / 2;
  const sy = H / 2 - 60;
  return ANIMALS.map((_, i) => ({ x: sx + i * (cw + gap), y: sy, w: cw, h: ch }));
}

function getStartBtn() {
  return { x: W / 2 - 95, y: H / 2 + 100, w: 190, h: 54 };
}

function getTwoPlayerBtn() {
  return { x: W / 2 - 120, y: H / 2 + 90, w: 235, h: 50 };
}

function getSoloBtn() {
  return { x: W / 2 - 90, y: H / 2 + 152, w: 180, h: 44 };
}

// ── Game logic ────────────────────────────────────────────────────────────────
function startGame() {
  level = 1;
  lives = 3;
  score = 0;
  initLevel();
  gs = 'playing';
}

function initLevel() {
  frame       = 0;
  gScroll     = 0;
  hillOff     = 0;
  flashFrames = 0;
  greenFrames = 0;
  obstacles = [];
  ditches   = [];
  diamonds  = [];
  hearts    = [];
  potions   = [];
  popups    = [];
  if (level % 2 === 1) heartSpawned = false;
  spawner = {
    cd: 160,
    lastType: '',
    platformCount: 0,
    diamondBudget: 10 + Math.floor(Math.random() * 11),
    potionSpawned: false,
    highDiaCD: 200 + Math.floor(Math.random() * 100),
  };
  players = [ makePlayer(PLAYER_X, selAnimal) ];
  if (twoPlayer) players.push(makePlayer(PLAYER_X2, selAnimal2));
  for (const c of clouds) c.x = [90, 330, 570, 730][clouds.indexOf(c)];
}

function advanceLevel() {
  if (level >= 5) { gs = 'win'; return; }
  level++;
  initLevel();
  gs = 'playing';
}

function update() {
  if (gs !== 'playing') return;

  const cfg = LEVEL_CFG[level - 1];
  frame++;
  gScroll = (gScroll + cfg.speed) % 50;
  hillOff += cfg.speed * 0.3;

  // Update each player (snapshot prevents issues if initLevel is called mid-loop)
  const activePlayers = [...players];
  for (const p of activePlayers) {
    updatePlayer(p, cfg);
    if (gs !== 'playing') return;
  }

  updateWorld(cfg);
  updateCollectibles(cfg);
  updateEnemies();
  updateSpawner(cfg);
  updateCollisions();

  if (frame >= LEVEL_FRAMES) gs = 'levelend';
}

function updateWorld(cfg) {
  // Clouds
  for (const c of clouds) {
    c.x -= cfg.speed * 0.25;
    if (c.x + c.r * 2.5 < 0) c.x = W + c.r * 2;
  }
  // Timers
  if (flashFrames > 0) flashFrames--;
  if (greenFrames > 0) greenFrames--;
  // Floating popups
  for (const pp of popups) { pp.y -= 1.5; pp.life--; }
  popups = popups.filter(pp => pp.life > 0);
  // Move & cull obstacles/ditches
  for (const o of obstacles) o.x -= cfg.speed;
  obstacles = obstacles.filter(o => o.x > -200);
  for (const d of ditches) d.x -= cfg.speed;
  ditches = ditches.filter(d => d.x + d.w > -10);
}

function updateCollectibles(cfg) {
  for (const h of hearts) h.x -= cfg.speed;
  hearts = hearts.filter(h => {
    if (h.x < -20) return false;
    for (const p of players) {
      if (Math.abs(p.x - h.x) < PLAYER_SIZE / 2 + 10 &&
          Math.abs((p.y - PLAYER_SIZE / 2) - h.y) < PLAYER_SIZE / 2 + 10) {
        lives = Math.min(lives + 1, 9);
        greenFrames = 14;
        playHeart();
        popups.push({ x: h.x, y: h.y - 10, text: '❤️ +1', life: 80, color: '#ff4488' });
        return false;
      }
    }
    return true;
  });

  for (const po of potions) po.x -= cfg.speed;
  potions = potions.filter(po => {
    if (po.x < -20) return false;
    for (const p of players) {
      if (Math.abs(p.x - po.x) < PLAYER_SIZE / 2 + 10 &&
          Math.abs((p.y - PLAYER_SIZE / 2) - po.y) < PLAYER_SIZE / 2 + 10) {
        p.floatFrames = 450;
        playPotion();
        popups.push({ x: po.x, y: po.y - 10, text: '✨ Schweben!', life: 90, color: '#80ff80' });
        return false;
      }
    }
    return true;
  });

  for (const d of diamonds) d.x -= cfg.speed;
  diamonds = diamonds.filter(d => {
    if (d.x < -20) return false;
    for (const p of players) {
      if (Math.abs(p.x - d.x) < PLAYER_SIZE / 2 + 6 &&
          Math.abs((p.y - PLAYER_SIZE / 2) - d.y) < PLAYER_SIZE / 2 + 6) {
        addScore(d.pts);
        playPling();
        popups.push({ x: d.x, y: d.y - 10, text: `+${d.pts}`, life: 45, color: d.color });
        return false;
      }
    }
    return true;
  });
}

function updateEnemies() {
  for (const o of obstacles) {
    if (o.type !== 'vulture') continue;
    switch (o.state) {
      case 'bottom':
        if (--o.stateTimer <= 0) o.state = 'rising';
        break;
      case 'rising':
        o.y -= o.flySpeed;
        if (o.y <= o.yHigh) { o.y = o.yHigh; o.state = 'top'; o.stateTimer = o.waitTop; }
        break;
      case 'top':
        if (--o.stateTimer <= 0) o.state = 'falling';
        break;
      case 'falling':
        o.y += o.flySpeed;
        if (o.y >= o.yLow) { o.y = o.yLow; o.state = 'bottom'; o.stateTimer = o.waitBot; }
        break;
    }
  }
}

function updateSpawner(cfg) {
  const flagTravelFrames = Math.ceil((W + 20 - PLAYER_X) / cfg.speed);
  const flagSpawnFrame   = LEVEL_FRAMES - 15 - flagTravelFrames;
  const clearZoneFrames  = Math.ceil(350 / cfg.speed);

  // Main spawn stream
  spawner.cd--;
  if (spawner.cd <= 0 && frame < flagSpawnFrame - clearZoneFrames) spawnNext(cfg);

  // High diamonds — only reachable in float mode (y ≈ 60–130, above max jump height)
  spawner.highDiaCD--;
  if (spawner.highDiaCD <= 0 && frame < flagSpawnFrame - clearZoneFrames) {
    const count   = 2 + Math.floor(Math.random() * 4);
    const baseY   = 60 + Math.floor(Math.random() * 70);
    const spacing = 55 + Math.floor(Math.random() * 40);
    for (let i = 0; i < count; i++) {
      const jitter = Math.floor(Math.random() * 30) - 15;
      diamonds.push({ x: W + 30 + i * spacing, y: baseY + jitter,
                      color: DIAMOND.high.color, pts: DIAMOND.high.pts });
    }
    spawner.highDiaCD = 260 + Math.floor(Math.random() * 140);
  }

  if (frame === flagSpawnFrame) {
    obstacles.push({ x: W + 20, type: 'flag' });
    obstacles = obstacles.filter(o => o.type === 'flag' || o.x < W);
    ditches   = ditches.filter(d => d.x + d.w < W);
  }
}

function updateCollisions() {
  for (const p of players) {
    if (p.invFrames === 0) {
      for (const o of obstacles) {
        if (o.type === 'flag' || o.type === 'platform') continue;
        if (!overlaps(p, o)) continue;
        if (o.type === 'box') {
          if (p.vy >= 0 && p.y > o.y + 5) hitP(p, o);
        } else if (o.type === 'lion') {
          if (!p.onGround && p.vy > 0) stompP(p, o, 100); else hitP(p, o);
        } else if (o.type === 'vulture') {
          if (!p.onGround && p.vy > 0) stompP(p, o, 150); else hitP(p, o);
        }
        break;
      }
    }
  }
}

function updatePlayer(p, cfg) {
  const prevY = p.y;

  if (p.floatFrames > 0) {
    const isP1  = p === players[0];
    const upKey = isP1 ? keys['ArrowUp']  : keys['KeyW'];
    const dnKey = isP1 ? keys['ArrowDown'] : keys['KeyS'];
    p.vy = upKey ? -2.5 : dnKey ? 2.5 : 0;
    p.y  = Math.max(PLAYER_SIZE, p.y + p.vy);
    p.onGround = false;
    p.floatFrames--;
    if (p.floatFrames === 0) playPuff();
  } else {
    p.vy += GRAVITY;
    p.y  += p.vy;
    p.onGround = false;
  }

  // Horizontal movement
  // Left speed = 65 % of world scroll → always visibly leftward but never faster than scroll
  const isP1      = p === players[0];
  const leftKey   = isP1 ? keys['ArrowLeft']  : keys['KeyA'];
  const rightKey  = isP1 ? keys['ArrowRight'] : keys['KeyD'];
  const leftSpeed = cfg.speed * 0.65;
  p.vx = rightKey ? MOVE_SPEED : leftKey ? -leftSpeed : 0;
  p.x  = Math.max(PLAYER_SIZE / 2 + 4, Math.min(W - PLAYER_SIZE / 2 - 4, p.x + p.vx));

  const aboveDitch = ditches.some(d => p.x > d.x + 8 && p.x < d.x + d.w - 8);
  const overDitch  = prevY > GROUND_Y || aboveDitch;

  if (aboveDitch && !p.onGround) p.pendingDitchBonus = true;

  if (p.floatFrames === 0 && !overDitch && p.y >= GROUND_Y) {
    p.y = GROUND_Y;
    p.vy = 0;
    p.onGround = true;
    if (p.pendingDitchBonus) {
      p.pendingDitchBonus = false;
      addScore(20);
      popups.push({ x: p.x, y: p.y - 60, text: '+20', life: 55, color: '#a0e060' });
    }
  }

  if (p.floatFrames === 0 && p.y > H + 60) {
    fellIntoDitchP(p);
    return;
  }

  if (!p.onGround && p.vy >= 0) {
    for (const o of obstacles) {
      if (o.type !== 'box' && o.type !== 'platform') continue;
      const pL = p.x - PLAYER_SIZE / 2 + 8;
      const pR = p.x + PLAYER_SIZE / 2 - 8;
      if (pR > o.x && pL < o.x + o.w && p.y >= o.y && prevY <= o.y + 6) {
        p.y = o.y;
        if (o.trampoline) {
          // Super-jump: ~360 px upward — enough to reach high diamonds at y≈60–130
          p.vy       = JUMP_VY * 1.45;
          p.jumpHeld = false;
          p.jumpBoost = 0;
          p.onGround  = false;
          playBoing();
        } else {
          p.vy = 0;
          p.onGround = true;
        }
        break;
      }
    }
  }

  if (p.jumpHeld && p.jumpBoost > 0 && p.vy < 0) {
    p.vy -= 0.5;
    p.jumpBoost--;
  } else if (p.vy >= 0) {
    p.jumpHeld = false;
  }

  if (p.onGround) {
    const prevRunT = p.runT;
    p.runT += 0.038;
    if (p.vx !== 0 && Math.floor(p.runT) > Math.floor(prevRunT)) playStep();
  }

  if (p.invFrames > 0) p.invFrames--;
}

// ── Spawn helpers ─────────────────────────────────────────────────────────────
const BOX_W = 44, BOX_H = 46;

function spawnNext(cfg) {
  const roll        = Math.random();
  const ditchProb   = 0.22;
  const enemyTotal  = cfg.lionRatio * (1 - ditchProb);
  const lionProb    = enemyTotal * 0.6;
  const vultureProb = enemyTotal * 0.4;
  const noEnemy     = spawner.lastType === 'lion' || spawner.lastType === 'vulture';
  let spawnedWidth;
  let enemySpawned = false;

  if (roll < ditchProb) {
    // Ditch
    const w = cfg.ditchWMin + Math.random() * (cfg.ditchWMax - cfg.ditchWMin);
    ditches.push({ x: W + 20, w });
    spawnedWidth = w;
    spawner.lastType = 'ditch';

  } else if (roll < ditchProb + lionProb && !noEnemy) {
    // Lion
    obstacles.push({ x: W + 20, y: GROUND_Y - 62, w: 58, h: 62, type: 'lion' });
    spawnedWidth = 58;
    enemySpawned = true;
    spawner.lastType = 'lion';

  } else if (roll < ditchProb + lionProb + vultureProb && !noEnemy) {
    // Vulture — oscillates vertically; starts randomly at bottom or top
    const vw = 68, vh = 44;
    const vYLow  = GROUND_Y - vh;
    const vYHigh = GROUND_Y - 195;
    const startTop = Math.random() < 0.5;
    const waitBot  = 60 + Math.floor(Math.random() * 60);
    const waitTop  = 50 + Math.floor(Math.random() * 50);
    obstacles.push({
      x: W + 20,
      y: startTop ? vYHigh : vYLow,
      yLow: vYLow, yHigh: vYHigh,
      w: vw, h: vh, type: 'vulture',
      state: startTop ? 'top' : 'bottom',
      stateTimer: startTop ? waitTop : waitBot,
      waitBot, waitTop, flySpeed: 2.5,
    });
    spawnedWidth = vw;
    enemySpawned = true;
    spawner.lastType = 'vulture';

  } else if (Math.random() < (twoPlayer ? 0.52 : 0.35)) {
    // Floating platform with stepping-stone boxes
    const n = Math.max(2, Math.floor(Math.random() * 5) + 2);
    spawnedWidth = spawnPlatform(n);
    spawner.lastType = 'platform';

  } else {
    // Box cluster (1–8)
    const n = clusterSize();
    spawnCluster(n);
    spawnedWidth = n * BOX_W;
    spawner.lastType = 'box';
  }

  // Enemies need a large gap so stomp-bounce can't chain into the next obstacle
  const gapMin = enemySpawned ? Math.max(cfg.gapLo, 340) : cfg.gapLo;
  const gapPx  = gapMin + Math.random() * (cfg.gapHi - gapMin);
  spawner.cd = Math.round((spawnedWidth + gapPx) / cfg.speed);

  // Occasionally scatter ground-level diamonds in the gap (clear of any obstacle)
  if (spawner.diamondBudget > 0 && spawner.lastType !== 'ditch' && Math.random() < 0.45) {
    const count    = 1 + Math.floor(Math.random() * 3);
    const gapStart = W + 20 + (spawnedWidth || 0) + 50;
    const spacing  = 44 + Math.floor(Math.random() * 36);
    for (let i = 0; i < count && spawner.diamondBudget > 0; i++) {
      diamonds.push({ x: gapStart + i * spacing, y: GROUND_Y - 20,
                      color: DIAMOND.box.color, pts: DIAMOND.box.pts });
      spawner.diamondBudget--;
    }
  }
}

function clusterSize() {
  // Weighted: 1=30%, 2=25%, 3=18%, 4=12%, 5=7%, 6=4%, 7=3%, 8=1%
  const r = Math.random();
  if (r < 0.30) return 1;
  if (r < 0.55) return 2;
  if (r < 0.73) return 3;
  if (r < 0.85) return 4;
  if (r < 0.92) return 5;
  if (r < 0.96) return 6;
  if (r < 0.99) return 7;
  return 8;
}

// Returns array of layer widths bottom→top.
// Each layer is 3 narrower (min 2), offset 2 boxes right → 2-wide left steps.
// Base 8 → [8, 5, 2], base 6 → [6, 3], base 4 → [4] etc.
function buildLayers(baseWidth) {
  const layers = [baseWidth];
  let w = baseWidth - 3;
  while (w >= 2) { layers.push(w); w -= 3; }
  return layers;
}

function spawnCluster(n) {
  const x0 = W + 20;
  // Track the topmost (lowest y value) box per x-column so diamonds land on the peak
  const colTop = new Map(); // box left-x → minimum y seen

  // Store object refs so we can mark trampolines after all layers are built
  const colTopRef = new Map(); // bx → obstacle object at the topmost position

  buildLayers(n).forEach((layerW, row) => {
    const xOff = row * 2 * BOX_W;
    const y = GROUND_Y - BOX_H * (row + 1);
    for (let i = 0; i < layerW; i++) {
      const bx = x0 + xOff + i * BOX_W;
      const obj = { x: bx, y, w: BOX_W, h: BOX_H, type: 'box' };
      obstacles.push(obj);
      if (!colTop.has(bx) || y < colTop.get(bx)) {
        colTop.set(bx, y);
        colTopRef.set(bx, obj);
      }
    }
  });

  // Mark ~1 in 10 topmost boxes as trampolines (pink, super-jump on landing)
  for (const obj of colTopRef.values()) {
    if (Math.random() < 0.10) obj.trampoline = true;
  }

  // Spawn potion only on single-height columns (no box stacked on top)
  if (!spawner.potionSpawned && Math.random() < 0.2) {
    const singleCols = [...colTop.entries()].filter(([, topY]) => topY === GROUND_Y - BOX_H);
    if (singleCols.length > 0) {
      const [bx] = singleCols[Math.floor(Math.random() * singleCols.length)];
      potions.push({ x: bx + BOX_W / 2, y: GROUND_Y - BOX_H - 22 });
      spawner.potionSpawned = true;
    }
  }

  // Place 1–2 diamonds on randomly chosen columns, always at the column's topmost box.
  // 30% of diamonds float 40–100 px above the box (still reachable by jumping).
  if (spawner.diamondBudget > 0 && Math.random() < 0.55) {
    const cols     = [...colTop.entries()];
    const count    = Math.min(spawner.diamondBudget, n >= 4 ? 2 : 1);
    const shuffled = cols.sort(() => Math.random() - 0.5).slice(0, count);
    for (const [bx, topY] of shuffled) {
      const floatExtra = Math.random() < 0.3 ? 40 + Math.random() * 60 : 0;
      diamonds.push({ x: bx + BOX_W / 2, y: topY - 14 - floatExtra,
                      color: DIAMOND.box.color, pts: DIAMOND.box.pts });
      spawner.diamondBudget--;
    }
  }
}

// Returns total spawned width (step + gap + platform + upper tiers) for spawner.cd calc.
function spawnPlatform(n) {
  const x0    = W + 20;
  const stepW = 2;                            // always 2 boxes wide (landable)
  const stepH = Math.random() < 0.5 ? 1 : 2; // 1 or 2 boxes high
  const gap   = BOX_W;                        // 1-box gap between step and platform

  // Stepping-stone boxes (normal brown boxes)
  for (let row = 0; row < stepH; row++) {
    const y = GROUND_Y - BOX_H * (row + 1);
    for (let i = 0; i < stepW; i++) {
      obstacles.push({ x: x0 + i * BOX_W, y, w: BOX_W, h: BOX_H, type: 'box' });
    }
  }

  // Tier-1 floating platform
  const platX = x0 + stepW * BOX_W + gap;
  for (let i = 0; i < n; i++) {
    obstacles.push({ x: platX + i * BOX_W, y: PLATFORM_Y, w: BOX_W, h: BOX_H, type: 'platform' });
  }

  // Every 2nd platform gets tier-1 diamonds just above
  spawner.platformCount++;
  if (spawner.platformCount % 2 === 0) {
    for (let i = 0; i < n; i++) {
      diamonds.push({ x: platX + i * BOX_W + BOX_W / 2, y: PLATFORM_Y - 16,
                      color: DIAMOND.tier1.color, pts: DIAMOND.tier1.pts });
    }
  }

  // Rarely place a heart on this platform (max 1 per 2-level pair)
  if (!heartSpawned && Math.random() < 0.25) {
    const hx = platX + Math.floor(Math.random() * n) * BOX_W + BOX_W / 2;
    hearts.push({ x: hx, y: PLATFORM_Y - 18 });
    heartSpawned = true;
  }

  // Higher tiers — driven by PLATFORM_TIERS config
  let totalExtraWidth = 0;
  let prevX = platX;
  let prevN = n;

  for (const tier of PLATFORM_TIERS) {
    if (Math.random() >= tier.spawnChance) break;
    const tn   = tier.minN + Math.floor(Math.random() * (tier.maxN - tier.minN + 1));
    const tgap = BOX_W + Math.floor(Math.random() * 2) * BOX_W;
    const tx   = prevX + prevN * BOX_W + tgap;
    for (let i = 0; i < tn; i++) {
      obstacles.push({ x: tx + i * BOX_W, y: tier.y, w: BOX_W, h: BOX_H, type: 'platform' });
    }
    if (Math.random() < tier.diaChance) {
      const ri  = Math.floor(Math.random() * tn);
      const def = DIAMOND[tier.diamond];
      diamonds.push({ x: tx + ri * BOX_W + BOX_W / 2, y: tier.y - 16,
                      color: def.color, pts: def.pts });
    }
    totalExtraWidth += tgap + tn * BOX_W;
    prevX = tx;
    prevN = tn;
  }

  return stepW * BOX_W + gap + n * BOX_W + totalExtraWidth;
}

function overlaps(p, o) {
  const m = 11;
  return (p.x - PLAYER_SIZE / 2 + m) < (o.x + o.w - m) &&
         (p.x + PLAYER_SIZE / 2 - m) > (o.x + m) &&
         (p.y - PLAYER_SIZE + m)     < (o.y + o.h - m) &&
         (p.y - m)                   > (o.y + m);
}

// Central score function — always checks 1000-point milestones
function addScore(pts) {
  const prev = score;
  score += pts;
  const milestones = Math.floor(score / 1000) - Math.floor(prev / 1000);
  for (let i = 0; i < milestones; i++) {
    lives = Math.min(lives + 1, 9);
    greenFrames = 40;
    popups.push({ x: W / 2, y: H / 2 - 20, text: '❤️ +1 Leben!', life: 90, color: '#ff6b6b' });
  }
}

function stompP(p, o, pts = 100) {
  const cx = o.x + o.w / 2, cy = o.y;
  o.x = -600;
  playPunch();
  p.vy = JUMP_VY * 0.6;
  addScore(pts);
  popups.push({ x: cx, y: cy, text: `+${pts}`, life: 55, color: '#FFD700' });
}

function hitP(p, o) {
  o.x = -600;
  lives--;
  p.invFrames = 110;
  flashFrames = 18;
  if (lives <= 0) gs = 'gameover';
}

function fellIntoDitchP(p) {
  lives--;
  flashFrames = 22;
  if (lives <= 0) {
    gs = 'gameover';
  } else {
    initLevel();
    gs = 'playing';
  }
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (gs === 'select')  { drawSelect();  return; }
  if (gs === 'select2') { drawSelect2(); return; }

  drawBackground();
  drawObstacles();
  drawDiamonds();
  drawHearts();
  drawPotions();
  drawPlayers();
  drawPopups();
  drawHUD();

  // Screen flash effects
  if (flashFrames > 0) {
    ctx.fillStyle = `rgba(255,0,0,${flashFrames * 0.045})`;
    ctx.fillRect(0, 0, W, H);
  }
  if (greenFrames > 0) {
    ctx.fillStyle = `rgba(0,220,80,${greenFrames * 0.04})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (gs === 'levelend') {
    drawOverlay(`🎉 Level ${level} geschafft!`,
      level >= 5 ? '▶ Weiter' : `▶ Level ${level + 1}`,
      `Punkte: ${score}`);
  } else if (gs === 'gameover') {
    drawOverlay('💀 Game Over', '🔄 Nochmal spielen',
      `Level ${level} · ${score} Punkte`);
  } else if (gs === 'win') {
    drawOverlay('🏆 Du hast gewonnen!', '🎮 Nochmal spielen',
      `${score} Punkte`);
  }
}

// ── Background ────────────────────────────────────────────────────────────────
function drawBackground() {
  const cfg = LEVEL_CFG[level - 1];

  // Sky gradient
  const sg = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sg.addColorStop(0, cfg.sky1);
  sg.addColorStop(1, cfg.sky2);
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Sun glow — layered circles instead of shadowBlur (no GPU flicker)
  const sunX = W - 80, sunY = 58;
  const sunR = level >= 4 ? 26 : 32;
  for (let i = 5; i >= 1; i--) {
    ctx.fillStyle = cfg.sunGlow + (0.06 * i) + ')';
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR + i * 10, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = cfg.sunColor;
  ctx.beginPath();
  ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
  ctx.fill();

  // Clouds
  for (const c of clouds) drawCloud(c.x, c.y, c.r, level >= 4);

  // Scrolling hills (levels 1–2) — hillOff is continuous, no modulo wrap-jump
  if (level <= 2) {
    ctx.fillStyle = 'rgba(80,140,60,0.30)';
    const ho = hillOff % 200;
    for (let hx = -ho; hx < W + 200; hx += 200) {
      ctx.beginPath();
      ctx.arc(hx + 100, GROUND_Y, 90, Math.PI, 0);
      ctx.fill();
    }
  }

  // Ground — drawn in segments, with gaps for ditches
  ctx.fillStyle = cfg.ground;
  let gx = 0;
  // Sort ditches left→right so segments are correct
  const sortedDitches = [...ditches].sort((a, b) => a.x - b.x);
  for (const d of sortedDitches) {
    const dx = Math.max(0, d.x);
    if (dx > gx) ctx.fillRect(gx, GROUND_Y, dx - gx, H - GROUND_Y);
    gx = Math.min(W, d.x + d.w);
  }
  if (gx < W) ctx.fillRect(gx, GROUND_Y, W - gx, H - GROUND_Y);

  // Ditch: dark abyss + glowing floor + edge walls
  for (const d of sortedDitches) {
    const dx = Math.max(0, d.x);
    const dw = Math.min(W, d.x + d.w) - dx;
    if (dw <= 0) continue;

    // Abyss background
    ctx.fillStyle = '#060008';
    ctx.fillRect(dx, GROUND_Y, dw, H - GROUND_Y);

    // Depth glow at bottom (lava-like on high levels, cold blue on low)
    const glowColor = level >= 4 ? 'rgba(200,40,0,0.55)' : 'rgba(60,0,120,0.45)';
    ctx.fillStyle = glowColor;
    ctx.fillRect(dx, H - 28, dw, 28);

    // Left wall
    ctx.fillStyle = '#333';
    ctx.fillRect(dx, GROUND_Y, 4, H - GROUND_Y);
    // Right wall
    ctx.fillStyle = '#222';
    ctx.fillRect(Math.min(W, d.x + d.w) - 4, GROUND_Y, 4, H - GROUND_Y);
  }

  // Ground top edge line
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  gx = 0;
  for (const d of sortedDitches) {
    const dx = Math.max(0, d.x);
    if (dx > gx) ctx.fillRect(gx, GROUND_Y, dx - gx, 4);
    gx = Math.min(W, d.x + d.w);
  }
  if (gx < W) ctx.fillRect(gx, GROUND_Y, W - gx, 4);
}

function drawCloud(x, y, r, dark) {
  ctx.fillStyle = dark ? 'rgba(180,60,40,0.45)' : 'rgba(255,255,255,0.80)';
  ctx.beginPath();
  ctx.arc(x,            y,     r,        0, Math.PI * 2);
  ctx.arc(x + r * 0.80, y + 5, r * 0.65, 0, Math.PI * 2);
  ctx.arc(x - r * 0.70, y + 8, r * 0.60, 0, Math.PI * 2);
  ctx.fill();
}

// ── Potions ───────────────────────────────────────────────────────────────────
function drawPotions() {
  for (const p of potions) {
    ctx.save();
    ctx.translate(p.x, p.y);
    // Flask body (round bottom)
    ctx.fillStyle = 'rgba(60,220,80,0.85)';
    ctx.beginPath();
    ctx.arc(0, 4, 9, 0, Math.PI * 2);
    ctx.fill();
    // Neck
    ctx.fillStyle = 'rgba(60,200,70,0.9)';
    ctx.fillRect(-4, -8, 8, 12);
    // Cork
    ctx.fillStyle = '#c8a060';
    ctx.fillRect(-3, -13, 6, 5);
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(-3, 0, 3, 5, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // Bubble inside
    ctx.fillStyle = 'rgba(180,255,180,0.6)';
    ctx.beginPath();
    ctx.arc(2, 5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Hearts ────────────────────────────────────────────────────────────────────
function drawHearts() {
  for (const h of hearts) {
    const r = 10;
    ctx.save();
    ctx.translate(h.x, h.y);
    // Glow
    ctx.fillStyle = 'rgba(255, 80, 120, 0.25)';
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.6, 0, Math.PI * 2);
    ctx.fill();
    // Heart shape: two circles + triangle
    ctx.fillStyle = '#ff3366';
    ctx.beginPath();
    ctx.arc(-r * 0.5, -r * 0.15, r * 0.65, Math.PI, 0);
    ctx.arc( r * 0.5, -r * 0.15, r * 0.65, Math.PI, 0);
    ctx.lineTo(0, r * 1.15);
    ctx.closePath();
    ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.3, -r * 0.3, r * 0.3, r * 0.18, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Diamonds ──────────────────────────────────────────────────────────────────
function drawDiamonds() {
  for (const d of diamonds) {
    const high = d.pts >= DIAMOND.high.pts;
    const s = high ? 13 : 9;
    ctx.save();
    ctx.translate(d.x, d.y);

    // Pulsing glow for float-only diamonds
    if (high) {
      const pulse = 0.18 + 0.12 * Math.sin(frame * 0.12 + d.x * 0.05);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(0, 0, s * 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Main gem body
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s, 0);
    ctx.lineTo(0, s);
    ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.fill();
    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s * 0.55, -s * 0.1);
    ctx.lineTo(0, s * 0.15);
    ctx.lineTo(-s * 0.45, -s * 0.1);
    ctx.closePath();
    ctx.fill();
    // Outline
    ctx.strokeStyle = high                         ? 'rgba(200,150,0,0.9)'
                    : d.pts === DIAMOND.tier3.pts  ? 'rgba(160,0,220,0.9)'
                    : d.pts === DIAMOND.tier2.pts  ? 'rgba(200,0,60,0.8)'
                    :                                'rgba(0,160,220,0.8)';
    ctx.lineWidth = high ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s, 0);
    ctx.lineTo(0, s);
    ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.stroke();

    // Point label beneath high diamonds
    if (high) {
      ctx.fillStyle = 'rgba(255,220,80,0.85)';
      ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`+${DIAMOND.high.pts}`, 0, s + 10);
    }

    ctx.restore();
  }
}

// ── Vulture drawing ───────────────────────────────────────────────────────────
function drawVulture(o) {
  const cx = o.x + o.w / 2;
  const cy = o.y + o.h / 2;
  // Wing angle depends on movement state
  const flap = o.state === 'rising' ? -12 : o.state === 'falling' ? 8 : -3;

  ctx.save();
  ctx.translate(cx, cy);

  // Wings (left & right, same shape mirrored)
  ctx.fillStyle = '#1a1230';
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(side * 20, -14 + flap, side * 36, -2 + flap * 0.4);
    ctx.quadraticCurveTo(side * 22, 10, side * 4, 8);
    ctx.closePath();
    ctx.fill();
    // Wing feather tips
    ctx.fillStyle = '#2a2050';
    ctx.beginPath();
    ctx.moveTo(side * 28, -4 + flap * 0.4);
    ctx.quadraticCurveTo(side * 36, -8 + flap * 0.5, side * 40, 0 + flap * 0.3);
    ctx.quadraticCurveTo(side * 34, 4, side * 26, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#1a1230'; // reset for next side
  }

  // Body
  ctx.fillStyle = '#2c2040';
  ctx.beginPath();
  ctx.ellipse(0, 4, 10, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Neck + bald head (faces left — toward player)
  ctx.fillStyle = '#d4a070';
  ctx.beginPath();
  ctx.arc(-10, -4, 8, 0, Math.PI * 2);
  ctx.fill();

  // Hooked beak
  ctx.fillStyle = '#b89000';
  ctx.beginPath();
  ctx.moveTo(-17, -5);
  ctx.lineTo(-27, -2);
  ctx.lineTo(-25, 3);
  ctx.lineTo(-17, 0);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ff3300';
  ctx.beginPath();
  ctx.arc(-12, -6, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-11.5, -6, 1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Warning badge
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.arc(cx, o.y - 12, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('!', cx, o.y - 7);
}

// ── Obstacles ─────────────────────────────────────────────────────────────────
function drawObstacles() {
  for (const o of obstacles) {
    if (o.type === 'box') {
      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(o.x + 5, o.y + o.h, o.w, 6);

      if (o.trampoline) {
        // ── Trampolin-Kiste (rosa) ──────────────────────────────────────────
        const bg = ctx.createLinearGradient(o.x, o.y, o.x + o.w, o.y + o.h);
        bg.addColorStop(0, '#FF88BB');
        bg.addColorStop(1, '#CC1166');
        ctx.fillStyle = bg;
        ctx.fillRect(o.x, o.y, o.w, o.h);
        // Spring coils
        ctx.strokeStyle = '#FF44AA';
        ctx.lineWidth = 1.5;
        for (let si = 1; si <= 3; si++) {
          const sx = o.x + (o.w / 4) * si;
          ctx.beginPath(); ctx.moveTo(sx, o.y + 5); ctx.lineTo(sx, o.y + o.h - 5); ctx.stroke();
        }
        // Arrow hint (↑)
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('↑', o.x + o.w / 2, o.y + o.h - 8);
        // Highlight edge
        ctx.fillStyle = '#FFB0D4';
        ctx.fillRect(o.x, o.y, o.w, 3);
        ctx.fillRect(o.x, o.y, 3, o.h);
      } else {
        // ── Normal box ─────────────────────────────────────────────────────
        const bg = ctx.createLinearGradient(o.x, o.y, o.x + o.w, o.y + o.h);
        bg.addColorStop(0, '#C87941');
        bg.addColorStop(1, '#7A4420');
        ctx.fillStyle = bg;
        ctx.fillRect(o.x, o.y, o.w, o.h);
        // Cross stripes
        ctx.fillStyle = '#5C3010';
        ctx.fillRect(o.x + o.w / 2 - 2, o.y,               4, o.h);
        ctx.fillRect(o.x,                o.y + o.h / 2 - 2, o.w, 4);
        // Highlight edge
        ctx.fillStyle = '#E8A060';
        ctx.fillRect(o.x, o.y, o.w, 3);
        ctx.fillRect(o.x, o.y,   3, o.h);
      }
    } else if (o.type === 'vulture') {
      drawVulture(o);
    } else if (o.type === 'platform') {
      // Semi-transparent blue floating platform block
      ctx.fillStyle = 'rgba(50, 130, 255, 0.38)';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // Top surface highlight
      ctx.fillStyle = 'rgba(160, 210, 255, 0.55)';
      ctx.fillRect(o.x, o.y, o.w, 5);
      // Inner grid line (visual separation between cells)
      ctx.strokeStyle = 'rgba(100, 180, 255, 0.7)';
      ctx.lineWidth = 1;
      ctx.strokeRect(o.x + 0.5, o.y + 0.5, o.w - 1, o.h - 1);
    } else if (o.type === 'flag') {
      const px = o.x;
      const base = GROUND_Y;
      const poleH = 110;
      // Pole
      ctx.fillStyle = '#aaa';
      ctx.fillRect(px - 2, base - poleH, 4, poleH);
      // Waving flag banner (checkered finish flag)
      const fw = 36, fh = 24;
      const fy = base - poleH;
      const cols = 4, rows = 3;
      const cw = fw / cols, ch = fh / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#222';
          ctx.fillRect(px + 2 + c * cw, fy + r * ch, cw, ch);
        }
      }
      // Flag border
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(px + 2, fy, fw, fh);
      // Base ball
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.arc(px, base, 5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Lion emoji
      ctx.font      = `${o.h}px serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.fillText('🦁', o.x + o.w / 2, o.y + o.h);

      // Warning badge
      ctx.fillStyle = '#ff2222';
      ctx.beginPath();
      ctx.arc(o.x + o.w / 2, o.y - 13, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font      = 'bold 14px Arial';
      ctx.fillText('!', o.x + o.w / 2, o.y - 8);
    }
  }
}

// ── Animal sprites ────────────────────────────────────────────────────────────
// Coord system: (0,0) = feet on ground, y-negative = up, animal faces RIGHT
// sw1/sw2 = foot displacement in px for each leg pair (opposite phase)
// jump = true when airborne → fixed pose instead of stride animation

function _l(hx, hy, sw) { // single leg: hip→foot as gentle curve
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.quadraticCurveTo(hx + sw * 0.4, hy * 0.4, hx + sw, 0);
  ctx.stroke();
}

function drawFox(sw1, sw2, jump) {
  const F='#E55A15', D='#B83D00', C='#F5E0C0', P='#FFB0A0';
  ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-11, -15, jump ? -9 : sw1); _l(-7, -15, jump ? -5 : sw2);
  _l(  8, -15, jump ?  7 : sw2); _l(12, -15, jump ? 11 : sw1);
  // Tail
  ctx.strokeStyle=F; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,-20); ctx.bezierCurveTo(-32,-18,-38,-36,-26,-46); ctx.stroke();
  ctx.strokeStyle='#eee'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-28,-42); ctx.lineTo(-24,-47); ctx.stroke();
  // Body
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(0,-24,21,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(4,-21,11,7,0.2,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(17,-33,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(24,-29,7,5,0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(29,-29,2.5,2,0,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(20,-35,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(21,-36,0.8,0,Math.PI*2); ctx.fill();
  // Ears
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.moveTo(9,-41); ctx.lineTo(6,-55); ctx.lineTo(17,-43); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(18,-43); ctx.lineTo(21,-56); ctx.lineTo(26,-43); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P;
  ctx.beginPath(); ctx.moveTo(10,-42); ctx.lineTo(8,-52); ctx.lineTo(16,-44); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(19,-44); ctx.lineTo(21,-53); ctx.lineTo(25,-44); ctx.closePath(); ctx.fill();
}

function drawDog(sw1, sw2, jump) {
  const F='#C48B2F', D='#8B6020', C='#F0D8A0';
  ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-11, -15, jump ? -10 : sw1); _l(-7, -15, jump ? -6 : sw2);
  _l(  8, -15, jump ?   8 : sw2); _l(12, -15, jump ? 12 : sw1);
  // Tail (wagging up)
  ctx.strokeStyle=F; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-17,-22); ctx.bezierCurveTo(-28,-15,-33,-28,-26,-38); ctx.stroke();
  // Body
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(0,-23,22,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(4,-20,12,7,0.2,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(17,-33,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(27,-29,8,6,0.1,0,Math.PI*2); ctx.fill();
  // Tongue
  ctx.fillStyle='#E05070'; ctx.beginPath(); ctx.ellipse(31,-24,3,4,0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.ellipse(33,-29,3,2.5,0,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(22,-36,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(23,-37,1,0,Math.PI*2); ctx.fill();
  // Floppy ears
  ctx.fillStyle=D;
  ctx.beginPath(); ctx.moveTo(9,-43); ctx.lineTo(5,-26); ctx.lineTo(14,-25); ctx.lineTo(18,-42); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(19,-43); ctx.lineTo(25,-26); ctx.lineTo(30,-28); ctx.lineTo(26,-43); ctx.closePath(); ctx.fill();
}

function drawCat(sw1, sw2, jump) {
  const F='#888', D='#555', C='#EEE', P='#FFB0C0';
  ctx.lineWidth=4; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-10, -14, jump ? -7 : sw1); _l(-6, -14, jump ? -4 : sw2);
  _l(  7, -14, jump ?  6 : sw2); _l(11, -14, jump ?  8 : sw1);
  // Tail (curling up)
  ctx.strokeStyle=F; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-17,-20); ctx.bezierCurveTo(-32,-18,-40,-30,-28,-50); ctx.stroke();
  // Body (slimmer)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(-1,-22,18,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(3,-19,9,6,0.2,0,Math.PI*2); ctx.fill();
  // Stripes
  ctx.strokeStyle=D; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-10,-14); ctx.lineTo(-12,-26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4,-13);  ctx.lineTo(-5,-25);  ctx.stroke();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(15,-32,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(22,-28,6,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=P; ctx.beginPath(); ctx.arc(26,-28,2,0,Math.PI*2); ctx.fill();
  // Eye (green cat eye with slit pupil)
  ctx.fillStyle='#3A3'; ctx.beginPath(); ctx.ellipse(19,-33,2.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(19,-33,1,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(20,-34,0.8,0,Math.PI*2); ctx.fill();
  // Whiskers
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(22,-27); ctx.lineTo(36,-25); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,-29); ctx.lineTo(36,-29); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,-31); ctx.lineTo(36,-33); ctx.stroke();
  // Ears
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.moveTo(6,-40);  ctx.lineTo(3,-55);  ctx.lineTo(15,-42); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(16,-42); ctx.lineTo(20,-56); ctx.lineTo(24,-43); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P;
  ctx.beginPath(); ctx.moveTo(7,-41);  ctx.lineTo(5,-51);  ctx.lineTo(14,-43); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(17,-43); ctx.lineTo(20,-52); ctx.lineTo(23,-44); ctx.closePath(); ctx.fill();
}

function drawDonkey(sw1, sw2, jump) {
  const F='#B8B8B8', D='#707070', C='#E8D8C0', M='#555';
  ctx.lineWidth=7; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-12, -18, jump ? -10 : sw1); _l(-7, -18, jump ?  -6 : sw2);
  _l(  8, -18, jump ?   8 : sw2); _l(13, -18, jump ?  12 : sw1);
  // Short tail with tuft
  ctx.strokeStyle=D; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-21,-21); ctx.lineTo(-31,-14); ctx.stroke();
  ctx.lineWidth=2;
  for (const a of [-0.5, 0, 0.5]) {
    ctx.beginPath(); ctx.moveTo(-31,-14);
    ctx.lineTo(-31 + Math.cos(a)*8, -14 + Math.sin(a)*8); ctx.stroke();
  }
  // Body (stocky)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(0,-24,24,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(3,-21,15,8,0.1,0,Math.PI*2); ctx.fill();
  // Mane
  ctx.strokeStyle=M; ctx.lineWidth=4; ctx.lineCap='round';
  for (let mx=5; mx<=15; mx+=4) {
    ctx.beginPath(); ctx.moveTo(mx,-33); ctx.lineTo(mx-1,-41); ctx.stroke();
  }
  // Head (elongated — faces RIGHT)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(19,-33,15,11,0.15,0,Math.PI*2); ctx.fill();
  // Large muzzle
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(31,-29,9,7,0.1,0,Math.PI*2); ctx.fill();
  // Nostrils
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.arc(29,-27,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(34,-27,1.5,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(23,-37,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(24,-38,1,0,Math.PI*2); ctx.fill();
  // LONG ears (donkey signature)
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.ellipse(12,-53,5,17,-0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(21,-53,5,17, 0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C;
  ctx.beginPath(); ctx.ellipse(12,-53,3,13,-0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(21,-53,3,13, 0.15,0,Math.PI*2); ctx.fill();
}

function drawWolf(sw1, sw2, jump) {
  const F='#607080', D='#3A4A58', L='#C8D4E0', C='#E0DDD8';
  ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle=D;
  _l(-11, -16, jump ? -8 : sw1); _l(-7, -16, jump ? -5 : sw2);
  _l(  8, -16, jump ?  7 : sw2); _l(12, -16, jump ? 10 : sw1);
  // Tail (bushy, held low)
  ctx.strokeStyle=F; ctx.lineWidth=11; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,-20); ctx.bezierCurveTo(-28,-16,-34,-8,-28,-2); ctx.stroke();
  ctx.strokeStyle=L; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-30,-5); ctx.lineTo(-27,-1); ctx.stroke();
  // Body (lean)
  ctx.fillStyle=F; ctx.beginPath(); ctx.ellipse(2,-24,22,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=L; ctx.beginPath(); ctx.ellipse(4,-21,14,6,0.1,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle=F; ctx.beginPath(); ctx.arc(19,-33,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C; ctx.beginPath(); ctx.ellipse(28,-30,8,5,0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(34,-30,2.5,2,0,0,Math.PI*2); ctx.fill();
  // Eye (yellow)
  ctx.fillStyle='#D4AA00'; ctx.beginPath(); ctx.arc(22,-36,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';    ctx.beginPath(); ctx.arc(22.5,-36,1.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';    ctx.beginPath(); ctx.arc(23,-37,0.7,0,Math.PI*2); ctx.fill();
  // Ears (pointed)
  ctx.fillStyle=F;
  ctx.beginPath(); ctx.moveTo(11,-41); ctx.lineTo(8,-57);  ctx.lineTo(20,-44); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(21,-44); ctx.lineTo(25,-58); ctx.lineTo(28,-44); ctx.closePath(); ctx.fill();
  ctx.fillStyle=D;
  ctx.beginPath(); ctx.moveTo(12,-42); ctx.lineTo(10,-53); ctx.lineTo(19,-45); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(22,-45); ctx.lineTo(25,-54); ctx.lineTo(27,-45); ctx.closePath(); ctx.fill();
}

const DRAW_FUNS = [drawFox, drawDog, drawCat, drawDonkey, drawWolf];

function drawAnimalSprite(cx, groundY, idx, runT, onGround) {
  const t    = runT * Math.PI * 2;
  const sw1  = onGround ? Math.sin(t) * 11 : 0;
  const bob  = onGround ? Math.sin(t * 2) * 1.5 : 0; // subtle up-down on each step
  ctx.save();
  ctx.translate(cx, groundY + bob);
  DRAW_FUNS[idx](sw1, -sw1, !onGround);
  ctx.restore();
}

// ── Players ───────────────────────────────────────────────────────────────────
function drawPlayers() {
  for (const p of players) {
    if (p.invFrames > 0 && Math.floor(p.invFrames / 7) % 2 === 1) continue;
    if (p.floatFrames > 0) {
      const pulse = 0.25 + 0.15 * Math.sin(frame * 0.2);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#40ff80';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y - PLAYER_SIZE * 0.5, PLAYER_SIZE * 0.6, PLAYER_SIZE * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      const barW = 36;
      const ratio = p.floatFrames / 300;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 10, barW, 5);
      ctx.fillStyle = `hsl(${120 * ratio},100%,50%)`;
      ctx.fillRect(p.x - barW / 2, p.y - PLAYER_SIZE - 10, barW * ratio, 5);
    }
    drawAnimalSprite(p.x, p.y, p.animalIdx, p.runT, p.onGround);
    if (twoPlayer) {
      const label = p === players[0] ? 'P1' : 'P2';
      ctx.fillStyle = p === players[0] ? '#80ddff' : '#ffdd80';
      ctx.font = 'bold 11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(label, p.x, p.y - PLAYER_SIZE - 4);
    }
  }
}

// ── Floating score popups ─────────────────────────────────────────────────────
function drawPopups() {
  for (const p of popups) {
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.fillStyle   = p.color;
    ctx.font        = p.text.length > 5 ? 'bold 22px Arial' : 'bold 26px Arial';
    ctx.textAlign   = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ── HUD helpers ───────────────────────────────────────────────────────────────
function drawHeart(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + r * 0.4);
  ctx.bezierCurveTo(x,           y - r * 0.5, x - r * 1.4, y - r * 0.5, x - r * 1.4, y + r * 0.2);
  ctx.bezierCurveTo(x - r * 1.4, y + r,       x,           y + r * 1.5, x,            y + r * 1.5);
  ctx.bezierCurveTo(x,           y + r * 1.5, x + r * 1.4, y + r,       x + r * 1.4,  y + r * 0.2);
  ctx.bezierCurveTo(x + r * 1.4, y - r * 0.5, x,           y - r * 0.5, x,            y + r * 0.4);
  ctx.fill();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Lives (drawn hearts — no emoji rendering)
  for (let i = 0; i < Math.max(lives, 3); i++) {
    drawHeart(18 + i * 32, 20, 11, i < lives ? '#e74c3c' : '#444');
  }

  // Score (center top)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  rrect(W / 2 - 70, 8, 140, 36, 8); ctx.fill();
  ctx.fillStyle = '#f5c842';
  ctx.font      = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`★ ${score}`, W / 2, 33);

  // Level badge (top right)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  rrect(W - 118, 8, 110, 36, 8); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font      = 'bold 17px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`Level ${level} / 5`, W - 12, 33);

  // Progress bar
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(14, H - 22, W - 28, 10);
  ctx.fillStyle = level >= 4 ? '#e74c3c' : '#27ae60';
  ctx.fillRect(14, H - 22, (W - 28) * Math.min(frame / LEVEL_FRAMES, 1), 10);

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font      = '11px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('Ziel ▶', W - 14, H - 26);
}

// ── Overlays ──────────────────────────────────────────────────────────────────
function drawOverlay(title, btnLabel, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  const bw = 440, bh = sub ? 238 : 210;
  const bx = W / 2 - bw / 2;
  const by = H / 2 - bh / 2;

  ctx.fillStyle   = '#10102a';
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth   = 3;
  rrect(bx, by, bw, bh, 20);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#f5c842';
  ctx.font      = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(title, W / 2, by + 58);

  if (sub) {
    ctx.fillStyle = '#ccc';
    ctx.font      = '19px Arial';
    ctx.fillText(sub, W / 2, by + 100);
  }

  const bby = by + bh - 64;
  ctx.fillStyle = '#218a45';
  rrect(W / 2 - 115, bby, 230, 48, 12); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font      = 'bold 20px Arial';
  ctx.fillText(btnLabel, W / 2, bby + 32);

  ctx.fillStyle = '#555';
  ctx.font      = '13px Arial';
  ctx.fillText('Klick oder ENTER zum Fortfahren', W / 2, by + bh + 22);
}

// ── Select screen ─────────────────────────────────────────────────────────────
function drawSelect() {
  // Pre-rendered star background (no per-frame arc calls)
  ctx.drawImage(starsBg, 0, 0);

  // Title — outline instead of shadowBlur
  ctx.font        = 'bold 50px Arial';
  ctx.textAlign   = 'center';
  ctx.strokeStyle = '#7a5200';
  ctx.lineWidth   = 5;
  ctx.strokeText('🌟 Tierabenteuer 🌟', W / 2, 76);
  ctx.fillStyle   = '#f5c842';
  ctx.fillText('🌟 Tierabenteuer 🌟', W / 2, 76);

  ctx.fillStyle = '#dde';
  ctx.font      = '20px Arial';
  ctx.fillText('Wähle dein Tier und starte das Abenteuer!', W / 2, 118);

  // Animal cards
  const cards = getCardRects();
  for (let i = 0; i < 5; i++) {
    const c   = cards[i];
    const sel = i === selAnimal;

    // Card offset shadow (rect, not shadowBlur)
    ctx.fillStyle = sel ? 'rgba(243,156,18,0.35)' : 'rgba(0,0,0,0.3)';
    ctx.fillRect(c.x + 4, c.y + 4, c.w, c.h);

    ctx.fillStyle   = sel ? '#2d4a22' : '#1e2a4a';
    ctx.strokeStyle = sel ? '#f5c842' : '#3a4a6a';
    ctx.lineWidth   = sel ? 3 : 1.5;
    rrect(c.x, c.y, c.w, c.h, 12);
    ctx.fill(); ctx.stroke();

    // Canvas-drawn animal (static mid-stride pose)
    ctx.save();
    ctx.translate(c.x + c.w / 2, c.y + 91);
    ctx.scale(0.76, 0.76);
    DRAW_FUNS[i](6, -6, false);
    ctx.restore();

    ctx.fillStyle = sel ? '#f5c842' : '#99aacc';
    ctx.font      = sel ? 'bold 15px Arial' : '14px Arial';
    ctx.fillText(ANIMALS[i].name, c.x + c.w / 2, c.y + 100);

    if (sel) {
      ctx.fillStyle = '#f5c842';
      ctx.font      = 'bold 17px Arial';
      ctx.fillText('✓', c.x + c.w / 2, c.y + 17);
    }
  }

  // Start button — colored border instead of shadowBlur
  const sb = getStartBtn();
  // Outer glow ring (opaque rect offset, cheap alternative)
  ctx.fillStyle = 'rgba(39,174,96,0.30)';
  rrect(sb.x - 4, sb.y - 4, sb.w + 8, sb.h + 8, 18); ctx.fill();

  ctx.fillStyle   = '#218a45';
  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth   = 2;
  rrect(sb.x, sb.y, sb.w, sb.h, 14);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font      = 'bold 24px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('▶  Spielen!', W / 2, sb.y + 36);

  // ── Controls panel ──────────────────────────────────────────────────────────
  const ctrlY = sb.y + sb.h + 22;
  const colW  = 220;
  const col1  = W / 2 - colW - 20;
  const col2  = W / 2 + 20;

  // Panel background
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  rrect(col1 - 14, ctrlY - 6, colW * 2 + 68, 106, 10);
  ctx.fill();

  // Column headers
  ctx.font      = 'bold 13px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#80ddff';
  ctx.fillText('Spieler 1', col1, ctrlY + 12);
  ctx.fillStyle = '#ffdd80';
  ctx.fillText('Spieler 2', col2, ctrlY + 12);

  // Divider line
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(W / 2 - 1, ctrlY, 2, 96);

  // Key rows
  const rows = [
    ['↑  Springen',          'W  Springen'],
    ['← →  Laufen',         'A D  Laufen'],
    ['↑ ↓  Schweben (Trank)','W S  Schweben (Trank)'],
    ['Klick / Tap  Springen', '—'],
  ];
  ctx.font      = '12px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  rows.forEach((row, i) => {
    ctx.fillText(row[0], col1, ctrlY + 30 + i * 18);
    ctx.fillText(row[1], col2, ctrlY + 30 + i * 18);
  });

  // Bonus info row
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font      = '11px Arial';
  ctx.fillText('Löwe/Geier springen +100/+150  ·  Graben überspringen +20  ·  1000 Punkte = +1 Leben', W / 2, ctrlY + 104);

  // Difficulty dots
  const dotY      = ctrlY + 120;
  const dotStartX = W / 2 - 60;
  for (let i = 0; i < 5; i++) {
    const ratio = (i + 1) / 5;
    ctx.fillStyle = `hsl(${120 - ratio * 120}, 80%, 55%)`;
    ctx.beginPath();
    ctx.arc(dotStartX + i * 30, dotY, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font      = 'bold 9px Arial';
    ctx.fillText(i + 1, dotStartX + i * 30, dotY + 4);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font      = '11px Arial';
  ctx.fillText('Schwierigkeit', W / 2, dotY + 20);
}

// ── Select 2 screen ───────────────────────────────────────────────────────────
function drawSelect2() {
  ctx.drawImage(starsBg, 0, 0);

  ctx.font        = 'bold 44px Arial';
  ctx.textAlign   = 'center';
  ctx.strokeStyle = '#7a5200';
  ctx.lineWidth   = 5;
  ctx.strokeText('Spieler 2 – Tier wählen', W / 2, 76);
  ctx.fillStyle   = '#f5c842';
  ctx.fillText('Spieler 2 – Tier wählen', W / 2, 76);

  ctx.fillStyle = '#dde';
  ctx.font      = '18px Arial';
  ctx.fillText('Spieler 2 steuert mit:  W = Springen  ·  S = Sinken (Trank)', W / 2, 112);

  const cards = getCardRects();
  for (let i = 0; i < 5; i++) {
    const c   = cards[i];
    const sel = i === selAnimal2;

    ctx.fillStyle = sel ? 'rgba(243,156,18,0.35)' : 'rgba(0,0,0,0.3)';
    ctx.fillRect(c.x + 4, c.y + 4, c.w, c.h);

    ctx.fillStyle   = sel ? '#2d4a22' : '#1e2a4a';
    ctx.strokeStyle = sel ? '#f5c842' : '#3a4a6a';
    ctx.lineWidth   = sel ? 3 : 1.5;
    rrect(c.x, c.y, c.w, c.h, 12);
    ctx.fill(); ctx.stroke();

    ctx.save();
    ctx.translate(c.x + c.w / 2, c.y + 91);
    ctx.scale(0.76, 0.76);
    DRAW_FUNS[i](6, -6, false);
    ctx.restore();

    ctx.fillStyle = sel ? '#f5c842' : '#99aacc';
    ctx.font      = sel ? 'bold 15px Arial' : '14px Arial';
    ctx.fillText(ANIMALS[i].name, c.x + c.w / 2, c.y + 100);

    if (sel) {
      ctx.fillStyle = '#f5c842';
      ctx.font      = 'bold 17px Arial';
      ctx.fillText('✓', c.x + c.w / 2, c.y + 17);
    }
  }

  // "Mit 2 Spielern!" button
  const b2 = getTwoPlayerBtn();
  ctx.fillStyle = 'rgba(39,174,96,0.30)';
  rrect(b2.x - 4, b2.y - 4, b2.w + 8, b2.h + 8, 18); ctx.fill();
  ctx.fillStyle   = '#218a45';
  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth   = 2;
  rrect(b2.x, b2.y, b2.w, b2.h, 14);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font      = 'bold 22px Arial';
  ctx.fillText('▶  Mit 2 Spielern!', W / 2, b2.y + 34);

  // "Alleine spielen" button
  const b1 = getSoloBtn();
  ctx.fillStyle   = '#1e2a4a';
  ctx.strokeStyle = '#4a6a8a';
  ctx.lineWidth   = 1.5;
  rrect(b1.x, b1.y, b1.w, b1.h, 12);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#99aacc';
  ctx.font      = '18px Arial';
  ctx.fillText('Alleine spielen', W / 2, b1.y + 29);
}

// ── Utility ───────────────────────────────────────────────────────────────────
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
